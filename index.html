<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لعبة المزاد | الإصدار الحماسي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Cinzel+Decorative:wght@900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --gold: linear-gradient(135deg, #8a6d3b 0%, #d4af37 25%, #fcf6ba 50%, #d4af37 75%, #8a6d3b 100%);
            --royal-blue: #020612;
            --red-pulse: #ff0000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; user-select: none; }
        body { background-color: var(--royal-blue); color: white; height: 100vh; overflow: hidden; }

        /* شاشة البداية */
        .screen { position: absolute; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .screen.active { display: flex; animation: zoomIn 0.5s ease; }
        @keyframes zoomIn { from { opacity: 0; transform: scale(1.2); } to { opacity: 1; transform: scale(1); } }

        /* الشعار والأنيميشن */
        .main-logo { font-family: 'Cinzel Decorative', cursive; font-size: 80px; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.5)); }
        
        /* كلام التحميس */
        .hype-text {
            position: absolute; color: var(--red-pulse); font-size: 50px; font-weight: 900;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.7); z-index: 50; pointer-events: none;
            animation: hypeAnim 1.5s ease-out forwards; opacity: 0;
        }
        @keyframes hypeAnim {
            0% { transform: scale(0.5) rotate(-10deg); opacity: 0; }
            50% { opacity: 1; transform: scale(1.2) rotate(10deg); }
            100% { opacity: 0; transform: translateY(-100px) scale(1.5); }
        }

        /* قاعة المزاد */
        .auction-room { width: 100%; max-width: 1200px; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .gavel { font-size: 100px; transition: 0.2s; cursor: pointer; }
        .gavel.hit { animation: hammerHit 0.3s ease; }
        @keyframes hammerHit { 0% { transform: rotate(0); } 50% { transform: rotate(-45deg); } 100% { transform: rotate(0); } }

        .price-tag { font-size: 100px; font-weight: 900; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: pulsePrice 1s infinite alternate; }
        @keyframes pulsePrice { from { transform: scale(1); } to { transform: scale(1.05); } }

        .timer-circle { font-size: 60px; font-weight: 900; color: #ff3e3e; font-family: monospace; border: 5px solid #ff3e3e; width: 120px; height: 120px; display: flex; align-items: center; justify-content: center; border-radius: 50%; box-shadow: 0 0 20px rgba(255, 62, 62, 0.4); }

        /* لوحة الفرق */
        .leaderboard { position: fixed; top: 20px; right: 20px; width: 250px; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 20px; border: 1px solid rgba(212,175,55,0.3); backdrop-filter: blur(10px); }
        .team-row { display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); padding: 5px; }

        /* أزرار المزايدة */
        .bid-area { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; margin-top: 20px; }
        .btn-bid { background: rgba(255,255,255,0.1); border: 2px solid white; color: white; padding: 15px 30px; border-radius: 50px; font-weight: 900; cursor: pointer; transition: 0.3s; }
        .btn-bid:hover { background: white; color: black; transform: scale(1.1); }
        .btn-bid.active-bidder { background: var(--gold); color: black; border-color: transparent; box-shadow: 0 0 30px #d4af37; }

        /* شاشة السؤال والمساعدات */
        .question-box { background: #000; padding: 40px; border-radius: 30px; border: 3px solid #d4af37; max-width: 700px; text-align: center; }
        .helpers-container { display: flex; gap: 10px; margin-top: 20px; justify-content: center; }
        .helper-btn { background: #1a1a1a; color: #d4af37; border: 1px solid #d4af37; padding: 10px 15px; border-radius: 10px; cursor: pointer; font-size: 14px; }
        .helper-btn:hover { background: #d4af37; color: black; }

        /* المدخلات */
        input, textarea { width: 100%; max-width: 400px; padding: 15px; border-radius: 15px; border: 1px solid #d4af37; background: #111; color: white; margin: 10px 0; text-align: center; font-size: 18px; }
    </style>
</head>
<body>

    <!-- التحميل -->
    <section id="screen-start" class="screen active">
        <h1 class="main-logo">الـمـزاد</h1>
        <button class="btn-bid" style="margin-top: 40px; padding: 20px 60px; font-size: 25px;" onclick="showScreen('screen-setup')">دخول القاعة</button>
    </section>

    <!-- الإعدادات -->
    <section id="screen-setup" class="screen">
        <div class="question-box">
            <h2>تجهيز المزاد</h2>
            <input type="text" id="teams-in" placeholder="أسماء الفرق (افصل بينهم بـ ،)">
            <input type="number" id="budget-in" placeholder="ميزانية كل فريق">
            <textarea id="qs-in" placeholder="أدخل الأسئلة هنا.. (سؤال في كل سطر)"></textarea>
            <button class="btn-bid" style="width:100%; background: #d4af37; color: black;" onclick="startAuction()">ابدأ المزاد 🔥</button>
        </div>
    </section>

    <!-- قاعة المزاد -->
    <section id="screen-auction" class="screen">
        <div id="hype-container"></div>
        <div class="leaderboard" id="leaderboard"></div>

        <div class="auction-room">
            <div class="gavel" id="gavel">🔨</div>
            <div id="lot-info" style="color: #d4af37; font-weight: bold; letter-spacing: 2px;">LOT #1</div>
            <div class="price-tag" id="price-display">0</div>
            <div class="timer-circle" id="auction-timer">15</div>
            <p id="bidder-info" style="font-size: 20px; color: #aaa;">زايد الآن لتربح السؤال!</p>

            <div class="bid-area" id="bid-btns"></div>
        </div>
    </section>

    <!-- شاشة السؤال والمساعدات -->
    <div id="modal-q" class="modal screen" style="background: rgba(0,0,0,0.9);">
        <div class="question-box">
            <h1 style="color: #d4af37;">تم البيع!</h1>
            <p id="winner-name-display" style="margin-bottom: 20px; font-weight: bold;"></p>
            <div id="answer-timer" class="timer-circle" style="margin: 0 auto 20px auto; width: 80px; height: 80px; font-size: 30px; border-color: #4ade80; color: #4ade80;">20</div>
            
            <div id="q-text-display" style="font-size: 28px; margin-bottom: 30px; font-weight: 900;">السؤال يظهر هنا..</div>
            <p id="category-display" style="color: #4ade80; display: none; margin-bottom: 10px;">الفئة: معلومة عامة</p>

            <div class="helpers-container">
                <button class="helper-btn" onclick="useHelper('category')">تحديد الفئة (-200)</button>
                <button class="helper-btn" onclick="useHelper( 'time')">زيادة 20ث (-200)</button>
                <button class="helper-btn" onclick="useHelper('skip')">تخطي السؤال (-200)</button>
            </div>

            <div style="display: flex; gap: 15px; margin-top: 30px; justify-content: center;">
                <button class="btn-bid" style="background: #4ade80; color: black;" onclick="resolveAnswer(true)">إجابة صحيحة ✅</button>
                <button class="btn-bid" style="background: #ff3e3e; color: white;" onclick="resolveAnswer(false)">إجابة خاطئة ❌</button>
            </div>
        </div>
    </div>

    <script>
        let game = {
            teams: [],
            qs: [],
            currentBid: 0,
            currentBidder: null,
            auctionTime: 15,
            answerTime: 20,
            lot: 1,
            timerInt: null,
            qTimerInt: null,
            isLocked: false,
            hypePhrases: ["ادفع!", "يالله سهلة!", "انت كفوووو!", "لا تخليهم!", "وين الفلوس؟", "شغل حماس!"]
        };

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'modal-q') document.getElementById(id).style.display = 'flex';
            else document.getElementById('modal-q').style.display = 'none';
        }

        function startAuction() {
            const names = document.getElementById('teams-in').value.split('،').map(n => n.trim());
            const budget = parseInt(document.getElementById('budget-in').value) || 5000;
            const qs = document.getElementById('qs-in').value.split('\n').filter(q => q.trim() !== "");

            if (names.length < 2 || qs.length === 0) return alert("أكمل البيانات أولاً!");

            game.teams = names.map((n, i) => ({ id: i, name: n, points: budget }));
            game.qs = qs;

            updateLeaderboard();
            createBidBtns();
            showScreen('screen-auction');
            setInterval(spawnHypeText, 3000); // تشغيل التحميس التلقائي
        }

        function spawnHypeText() {
            if (!document.getElementById('screen-auction').classList.contains('active')) return;
            const text = game.hypePhrases[Math.floor(Math.random() * game.hypePhrases.length)];
            const div = document.createElement('div');
            div.className = 'hype-text';
            div.innerText = text;
            div.style.left = Math.random() * 70 + 15 + "%";
            div.style.top = Math.random() * 50 + 20 + "%";
            document.getElementById('hype-container').appendChild(div);
            setTimeout(() => div.remove(), 2000);
        }

        function createBidBtns() {
            const container = document.getElementById('bid-btns');
            container.innerHTML = '';
            game.teams.forEach(t => {
                const btn = document.createElement('button');
                btn.className = 'btn-bid';
                btn.id = `btn-team-${t.id}`;
                btn.innerHTML = `${t.name}<br>+100`;
                btn.onclick = () => placeBid(t.id);
                container.appendChild(btn);
            });
        }

        function placeBid(teamId) {
            if (game.isLocked) return;
            const team = game.teams.find(t => t.id === teamId);
            const nextPrice = game.currentBid + 100;

            if (team.points < nextPrice) return alert("الميزانية لا تسمح!");

            game.currentBid = nextPrice;
            game.currentBidder = teamId;
            game.auctionTime = 15; // إعادة تصفير وقت المزاد عند كل مزايدة

            document.getElementById('price-display').innerText = game.currentBid;
            document.getElementById('bidder-info').innerText = `المزايد الأعلى: ${team.name}`;
            document.getElementById('auction-timer').innerText = "15";

            document.querySelectorAll('.btn-bid').forEach(b => b.classList.remove('active-bidder'));
            document.getElementById(`btn-team-${teamId}`).classList.add('active-bidder');

            if (!game.timerInt) startAuctionTimer();
            spawnHypeText();
        }

        function startAuctionTimer() {
            game.timerInt = setInterval(() => {
                game.auctionTime--;
                document.getElementById('auction-timer').innerText = game.auctionTime;

                if (game.auctionTime <= 0) {
                    clearInterval(game.timerInt);
                    game.timerInt = null;
                    finalizeLot();
                }
            }, 1000);
        }

        function finalizeLot() {
            if (game.currentBidder === null) return alert("انتهى الوقت بدون مزايدة!");
            game.isLocked = true;
            document.getElementById('gavel').classList.add('hit');
            
            setTimeout(() => {
                const winner = game.teams.find(t => t.id === game.currentBidder);
                winner.points -= game.currentBid;
                updateLeaderboard();
                
                // فتح شاشة السؤال
                showScreen('modal-q');
                document.getElementById('winner-name-display').innerText = `مبروك لـ ${winner.name}`;
                document.getElementById('q-text-display').innerText = game.qs[Math.floor(Math.random() * game.qs.length)];
                document.getElementById('category-display').style.display = 'none';
                startAnswerTimer();
            }, 500);
        }

        function startAnswerTimer() {
            game.answerTime = 20;
            document.getElementById('answer-timer').innerText = "20";
            game.qTimerInt = setInterval(() => {
                game.answerTime--;
                document.getElementById('answer-timer').innerText = game.answerTime;
                if (game.answerTime <= 0) {
                    clearInterval(game.qTimerInt);
                    alert("انتهى وقت الإجابة!");
                    resolveAnswer(false);
                }
            }, 1000);
        }

        function useHelper(type) {
            const team = game.teams.find(t => t.id === game.currentBidder);
            if (team.points < 200) return alert("لا تملك نقاط كافية للمساعدة!");
            
            team.points -= 200;
            updateLeaderboard();

            if (type === 'category') {
                document.getElementById('category-display').style.display = 'block';
                document.getElementById('category-display').innerText = "تلميح: السؤال يتعلق بالثقافة العامة!";
            } else if (type === 'time') {
                game.answerTime += 20;
                document.getElementById('answer-timer').innerText = game.answerTime;
            } else if (type === 'skip') {
                clearInterval(game.qTimerInt);
                alert("تم التخطي!");
                resolveAnswer(false);
            }
        }

        function resolveAnswer(isCorrect) {
            clearInterval(game.qTimerInt);
            const team = game.teams.find(t => t.id === game.currentBidder);
            if (isCorrect) {
                team.points += (game.currentBid * 2);
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            }
            
            game.lot++;
            game.currentBid = 0;
            game.currentBidder = null;
            game.isLocked = false;
            document.getElementById('price-display').innerText = "0";
            document.getElementById('lot-info').innerText = `LOT #${game.lot}`;
            document.getElementById('gavel').classList.remove('hit');
            document.getElementById('auction-timer').innerText = "15";
            updateLeaderboard();
            showScreen('screen-auction');
        }

        function updateLeaderboard() {
            const board = document.getElementById('leaderboard');
            board.innerHTML = '<h3 style="color:#d4af37; margin-bottom:10px;">لوحة المزاد</h3>';
            [...game.teams].sort((a, b) => b.points - a.points).forEach(t => {
                board.innerHTML += `<div class="team-row"><span>${t.name}</span><span>${t.points}</span></div>`;
            });
        }
    </script>
</body>
</html>
