<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الموسوعة الملكية للمسابقات</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            --gold-solid: #b38728;
            --dark-bg: #050505;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body {
            background-color: var(--dark-bg);
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            color: white;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* العنوان الرئيسي */
        .main-header {
            margin-top: 50px;
            text-align: center;
            animation: fadeInDown 1.5s ease-out;
        }

        .main-header h1 {
            font-family: 'Amiri', serif;
            font-size: 4rem;
            background: var(--gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            filter: drop-shadow(0 5px 15px rgba(179, 135, 40, 0.3));
        }

        /* شبكة الحروف */
        .alphabet-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 20px;
            max-width: 900px;
            padding: 40px;
            animation: fadeIn 2s ease-in;
        }

        .letter-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--glass);
            border: 2px solid var(--gold-solid);
            color: var(--gold-solid);
            font-size: 2rem;
            font-family: 'Amiri', serif;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 15px rgba(179, 135, 40, 0.1);
        }

        .letter-btn:hover {
            background: var(--gold);
            color: black;
            transform: scale(1.1) rotate(10deg);
            box-shadow: 0 0 30px rgba(251, 245, 183, 0.6);
        }

        /* شاشة السؤال */
        #question-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 800px;
            margin-top: 20px;
        }

        .question-card {
            background: var(--glass);
            border: 3px solid;
            border-image: var(--gold) 1;
            padding: 60px;
            text-align: center;
            width: 100%;
            position: relative;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .question-number {
            font-size: 1.2rem;
            color: var(--gold-solid);
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        #question-text {
            font-size: 2.5rem;
            line-height: 1.6;
            margin-bottom: 40px;
            min-height: 150px;
        }

        /* الأزرار */
        .controls {
            display: flex;
            gap: 20px;
            margin-top: 40px;
        }

        .btn-royal {
            padding: 15px 35px;
            border: 1px solid var(--gold-solid);
            background: transparent;
            color: var(--gold-solid);
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .btn-royal:hover {
            background: var(--gold);
            color: black;
        }

        .btn-random {
            background: var(--gold);
            color: black;
            border: none;
            box-shadow: 0 0 20px rgba(179, 135, 40, 0.4);
        }

        .back-link {
            margin-top: 30px;
            color: #666;
            cursor: pointer;
            text-decoration: underline;
        }

        /* أنيميشن */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .fade-in { animation: fadeIn 0.5s ease-in; }

    </style>
</head>
<body>

    <div class="main-header" id="header">
        <h1>الموسوعة الملكية</h1>
        <p style="color: #aaa; letter-spacing: 3px;">اختر حرف البداية للانطلاق</p>
    </div>

    <!-- شبكة الحروف -->
    <div class="alphabet-grid" id="alphabet-grid">
        <!-- سيتم توليد الحروف بواسطة JavaScript -->
    </div>

    <!-- شاشة السؤال -->
    <div id="question-screen">
        <h2 id="current-letter-title" class="question-number" style="font-size: 3rem; margin-bottom: 0;">حرف أ</h2>
        <div class="question-card fade-in">
            <div class="question-number">سؤال رقم <span id="q-idx">1</span> من 25</div>
            <div id="question-text">السؤال يظهر هنا...</div>
            
            <div class="controls">
                <button class="btn-royal" onclick="prevQuestion()">السابق</button>
                <button class="btn-royal btn-random" onclick="randomQuestion()">سؤال عشوائي</button>
                <button class="btn-royal" onclick="nextQuestion()">التالي</button>
            </div>
        </div>
        <div class="back-link" onclick="goBack()">العودة لقائمة الحروف</div>
    </div>

    <script>
        const letters = "أبتثجحخدذرزسشصضطظعغفقكلمنهوي".split("");
        let currentLetter = "";
        let currentIndex = 0;

        // توليد الحروف في الصفحة
        const grid = document.getElementById('alphabet-grid');
        letters.forEach(char => {
            const btn = document.createElement('div');
            btn.className = 'letter-btn';
            btn.innerText = char;
            btn.onclick = () => startLetter(char);
            grid.appendChild(btn);
        });

        function startLetter(char) {
            currentLetter = char;
            currentIndex = 1;
            document.getElementById('header').style.display = 'none';
            document.getElementById('alphabet-grid').style.display = 'none';
            document.getElementById('question-screen').style.display = 'flex';
            document.getElementById('current-letter-title').innerText = "حرف " + char;
            updateQuestionDisplay();
        }

        function updateQuestionDisplay() {
            document.getElementById('q-idx').innerText = currentIndex;
            // هنا نضع نصاً افتراضياً لأنك طلبت التصميم فقط
            document.getElementById('question-text').innerText = `السؤال رقم (${currentIndex}) لحرف (${currentLetter}) يظهر هنا.. استعد للإجابة!`;
            
            // إضافة تأثير حركة بسيط عند تغيير السؤال
            const card = document.querySelector('.question-card');
            card.classList.remove('fade-in');
            void card.offsetWidth; // Trigger reflow
            card.classList.add('fade-in');
        }

        function nextQuestion() {
            if (currentIndex < 25) {
                currentIndex++;
                updateQuestionDisplay();
            }
        }

        function prevQuestion() {
            if (currentIndex > 1) {
                currentIndex--;
                updateQuestionDisplay();
            }
        }

        function randomQuestion() {
            currentIndex = Math.floor(Math.random() * 25) + 1;
            updateQuestionDisplay();
        }

        function goBack() {
            document.getElementById('header').style.display = 'block';
            document.getElementById('alphabet-grid').style.display = 'grid';
            document.getElementById('question-screen').style.display = 'none';
        }
    </script>
</body>
</html>
