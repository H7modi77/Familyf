<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المزاد الأسطوري | The Grand Auction</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Cinzel+Decorative:wght@700;900&family=Reem+Kufi:wght@900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --gold: linear-gradient(135deg, #8a6d3b 0%, #d4af37 25%, #fcf6ba 50%, #d4af37 75%, #8a6d3b 100%);
            --royal-blue: #020612;
            --marble: rgba(255, 255, 255, 0.05);
            --gold-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--royal-blue);
            color: white;
            height: 100vh;
            overflow: hidden;
            background-image: radial-gradient(circle at center, #0a1931 0%, #010409 100%);
        }

        /* شاشة التحميل (App Store Feel) */
        #splash {
            position: fixed; width: 100%; height: 100%; background: var(--royal-blue);
            z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .splash-logo {
            font-family: 'Cinzel Decorative', cursive; font-size: 60px;
            background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } }

        /* الشاشات */
        .screen {
            position: absolute; width: 100%; height: 100%; display: none;
            flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }
        .screen.active { display: flex; animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* لوحة الصدارة (Leaderboard) */
        .leaderboard {
            position: fixed; top: 20px; right: 20px; width: 250px;
            background: var(--marble); border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 20px; padding: 15px; backdrop-filter: blur(10px); z-index: 100;
        }
        .leader-item { display: flex; justify-content: space-between; margin-bottom: 10px; padding-bottom: 5px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .leader-item.winning { color: #fcf6ba; font-weight: bold; text-shadow: 0 0 10px #d4af37; }

        /* منطقة المزاد الرئيسية */
        .auction-stage {
            flex: 1; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .item-card {
            width: 350px; height: 450px; background: rgba(0,0,0,0.5);
            border: 3px solid #d4af37; border-radius: 30px; position: relative;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.2); transition: 0.5s;
        }
        .item-card.locked::after {
            content: "؟"; position: absolute; font-size: 150px; color: rgba(212, 175, 55, 0.2);
            font-family: 'Cinzel Decorative';
        }

        /* المطرقة الذهبية (The Gavel) */
        .gavel-container {
            position: absolute; top: -100px; left: 50%; transform: translateX(-50%);
            font-size: 80px; transition: 0.3s; pointer-events: none; opacity: 0;
        }
        .gavel-container.strike { animation: gavelStrike 0.5s ease; opacity: 1; }
        @keyframes gavelStrike {
            0% { transform: translateX(-50%) rotate(0deg); }
            50% { transform: translateX(-50%) rotate(-45deg); }
            100% { transform: translateX(-50%) rotate(0deg); }
        }

        /* العداد والسعر الحالي */
        .auction-info { margin-top: 30px; text-align: center; }
        .current-price { font-size: 80px; font-weight: 900; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .timer-auction { font-size: 40px; font-weight: bold; color: #ff4d4d; margin-top: -10px; }

        /* أزرار المزايدة */
        .bid-controls {
            display: flex; gap: 20px; margin-top: 40px; width: 100%; justify-content: center;
        }
        .team-bid-btn {
            background: rgba(255,255,255,0.05); border: 2px solid white; color: white;
            padding: 15px 30px; border-radius: 50px; font-weight: 900; cursor: pointer;
            transition: 0.3s; font-size: 18px;
        }
        .team-bid-btn:hover { background: white; color: black; transform: translateY(-5px); }
        .team-bid-btn.high-bidder { border-color: #d4af37; background: rgba(212,175,55,0.2); box-shadow: 0 0 20px #d4af37; }

        /* الإعدادات */
        .setup-input {
            width: 100%; max-width: 400px; background: rgba(255,255,255,0.1);
            border: 1px solid #d4af37; padding: 15px; border-radius: 15px; color: white;
            margin-bottom: 20px; font-size: 18px; text-align: center;
        }

        /* المودال */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: #000; padding: 40px; border-radius: 30px; border: 2px solid #d4af37; text-align: center; max-width: 500px; width: 90%; }
    </style>
</head>
<body>

    <!-- Splash Screen -->
    <div id="splash">
        <div class="splash-logo">THE GRAND AUCTION</div>
        <p style="margin-top: 20px; letter-spacing: 5px; color: #d4af37;">المزاد الأسطوري</p>
    </div>

    <!-- شاشة البداية -->
    <section id="screen-start" class="screen">
        <h1 style="font-family: 'Reem Kufi'; font-size: 70px; margin-bottom: 20px;">المزاد الأسطوري</h1>
        <button class="team-bid-btn" style="padding: 20px 60px; font-size: 25px; border-color: #d4af37; color: #d4af37;" onclick="showScreen('screen-setup')">بدء المزاد الجديد</button>
    </section>

    <!-- شاشة الإعدادات -->
    <section id="screen-setup" class="screen">
        <h2 style="margin-bottom: 30px; color: #fcf6ba;">تجهيز قاعة المزاد</h2>
        <input type="text" id="team-names" class="setup-input" placeholder="أدخل أسماء الفرق (مثال: الصقور، النمور)">
        <input type="number" id="start-budget" class="setup-input" placeholder="ميزانية البداية (مثال: 5000)">
        <button class="team-bid-btn" style="width: 100%; max-width: 400px; background: #d4af37; color: black;" onclick="initAuction()">فتح القاعة</button>
    </section>

    <!-- شاشة المزاد الرئيسية -->
    <section id="screen-auction" class="screen">
        <div class="leaderboard" id="leaderboard">
            <!-- التحديث تلقائي -->
        </div>

        <div class="auction-stage">
            <div class="gavel-container" id="gavel">🔨</div>
            <div class="item-card locked" id="auction-card">
                <h3 id="lot-number" style="position: absolute; top: 20px; left: 20px; color: #d4af37;">LOT #1</h3>
                <div id="lot-status" style="font-size: 20px; font-weight: bold; margin-top: 100px;">المزاد مفتوح</div>
            </div>

            <div class="auction-info">
                <div class="current-price" id="current-price">0</div>
                <div class="timer-auction" id="auction-timer">10</div>
                <p id="high-bidder-name" style="font-size: 22px; margin-top: 10px; color: #d4af37;">بانتظار المزايدة الأولى...</p>
            </div>
        </div>

        <div class="bid-controls" id="team-controls">
            <!-- يتم توليدها حسب الفرق -->
        </div>

        <button class="team-bid-btn" style="margin-top: 20px; font-size: 14px; opacity: 0.5;" onclick="startNewLot()">تخطي لهذا السؤال ⏭️</button>
    </section>

    <!-- مودال كشف السؤال -->
    <div id="modal-reveal" class="modal">
        <div class="modal-content">
            <h2 id="winner-announcement" style="color: #d4af37; margin-bottom: 20px;">بيعت للفريق!</h2>
            <div id="question-text" style="font-size: 24px; margin-bottom: 30px; line-height: 1.6;">ما هو الشيء الذي...؟</div>
            <div style="display: flex; gap: 20px; justify-content: center;">
                <button class="team-bid-btn" style="border-color: #4ade80; color: #4ade80;" onclick="handleAnswer(true)">إجابة صحيحة ✅</button>
                <button class="team-bid-btn" style="border-color: #ff4d4d; color: #ff4d4d;" onclick="handleAnswer(false)">إجابة خاطئة ❌</button>
            </div>
        </div>
    </div>

    <!-- المؤثرات الصوتية (استخدم روابط حقيقية إذا توفرت) -->
    <script>
        // داتابيز الأسئلة (يمكنك زيادتها)
        const questions = [
            "ما هو الكوكب الذي يلقب بالكوكب الأحمر؟",
            "كم عدد قارات العالم؟",
            "ما هو الحيوان الذي يلقب بسفينة الصحراء؟",
            "ما هي عاصمة اليابان؟",
            "ما هو أطول نهر في العالم؟",
            "من هو مخترع المصباح الكهربائي؟",
            "ما هو العنصر الكيميائي الذي يرمز له بالرمز O؟",
            "ما هي أكبر قارة في العالم؟"
        ];

        let gameState = {
            teams: [],
            currentLot: 1,
            currentBid: 0,
            highBidder: null,
            timer: 10,
            timerInt: null,
            bidIncrement: 100,
            isLocked: false
        };

        // إخفاء الـ Splash بعد ثانيتين
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('splash').style.opacity = '0';
                setTimeout(() => document.getElementById('splash').style.display = 'none', 500);
                showScreen('screen-start');
            }, 2500);
        };

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function initAuction() {
            const names = document.getElementById('team-names').value.split('،').map(n => n.trim());
            const budget = parseInt(document.getElementById('start-budget').value) || 5000;

            if (names.length < 2) {
                alert("يجب إدخال اسم فريقين على الأقل");
                return;
            }

            gameState.teams = names.map((name, index) => ({
                id: index,
                name: name,
                points: budget
            }));

            renderLeaderboard();
            renderControls();
            showScreen('screen-auction');
            startNewLot();
        }

        function renderLeaderboard() {
            const board = document.getElementById('leaderboard');
            board.innerHTML = '<h3 style="margin-bottom:10px; font-size:14px; color:#d4af37;">لوحة الصدارة الملكية</h3>';
            
            [...gameState.teams].sort((a, b) => b.points - a.points).forEach(team => {
                board.innerHTML += `
                    <div class="leader-item ${gameState.highBidder === team.id ? 'winning' : ''}">
                        <span>${team.name}</span>
                        <span>${team.points}</span>
                    </div>
                `;
            });
        }

        function renderControls() {
            const controls = document.getElementById('team-controls');
            controls.innerHTML = '';
            gameState.teams.forEach(team => {
                controls.innerHTML += `
                    <button class="team-bid-btn ${gameState.highBidder === team.id ? 'high-bidder' : ''}" 
                            id="bid-btn-${team.id}" 
                            onclick="placeBid(${team.id})">
                        ${team.name} <br> <small>زايد +${gameState.bidIncrement}</small>
                    </button>
                `;
            });
        }

        function startNewLot() {
            gameState.currentBid = 0;
            gameState.highBidder = null;
            gameState.timer = 10;
            gameState.isLocked = false;
            
            document.getElementById('lot-number').innerText = `LOT #${gameState.currentLot}`;
            document.getElementById('current-price').innerText = "0";
            document.getElementById('high-bidder-name').innerText = "بانتظار المزايدة الأولى...";
            document.getElementById('auction-timer').innerText = "10";
            document.getElementById('auction-card').classList.add('locked');
            
            renderControls();
            renderLeaderboard();
            clearInterval(gameState.timerInt);
        }

        function placeBid(teamId) {
            if (gameState.isLocked) return;

            const team = gameState.teams.find(t => t.id === teamId);
            const nextBid = gameState.currentBid + gameState.bidIncrement;

            if (team.points < nextBid) {
                alert("الميزانية لا تسمح!");
                return;
            }

            // تحديث المزايدة
            gameState.currentBid = nextBid;
            gameState.highBidder = teamId;
            gameState.timer = 10; // إعادة تصفير العداد عند كل مزايدة

            document.getElementById('current-price').innerText = gameState.currentBid;
            document.getElementById('high-bidder-name').innerText = `المزايد الأعلى: ${team.name}`;
            
            renderControls();
            renderLeaderboard();

            // بدء العداد إذا لم يكن قد بدأ
            if (!gameState.timerInt) {
                startTimer();
            }
        }

        function startTimer() {
            clearInterval(gameState.timerInt);
            gameState.timerInt = setInterval(() => {
                gameState.timer--;
                document.getElementById('auction-timer').innerText = gameState.timer;

                if (gameState.timer === 3) announce("بيعة أولى!");
                if (gameState.timer === 2) announce("بيعة ثانية!");
                if (gameState.timer === 1) announce("بيعة ثالثة!");

                if (gameState.timer <= 0) {
                    clearInterval(gameState.timerInt);
                    gameState.timerInt = null;
                    finalizeAuction();
                }
            }, 1000);
        }

        function announce(msg) {
            document.getElementById('lot-status').innerText = msg;
            // تأثير صوتي بسيط
            const beep = new AudioContext();
            const osc = beep.createOscillator();
            osc.connect(beep.destination);
            osc.start();
            osc.stop(beep.currentTime + 0.1);
        }

        function finalizeAuction() {
            if (gameState.highBidder === null) {
                alert("لم يتم المزايدة على هذا اللوت.");
                startNewLot();
                return;
            }

            gameState.isLocked = true;
            document.getElementById('gavel').classList.add('strike');
            
            // صوت المطرقة
            setTimeout(() => {
                document.getElementById('gavel').classList.remove('strike');
                const winner = gameState.teams.find(t => t.id === gameState.highBidder);
                
                // خصم قيمة المزاد من الفريق
                winner.points -= gameState.currentBid;
                
                revealQuestion(winner);
            }, 500);
        }

        function revealQuestion(winner) {
            const modal = document.getElementById('modal-reveal');
            document.getElementById('winner-announcement').innerText = `مبروك لفريق ${winner.name}!`;
            document.getElementById('question-text').innerText = questions[Math.floor(Math.random() * questions.length)];
            modal.style.display = 'flex';
            
            confetti({
                particleCount: 100,
                spread: 70,
                origin: { y: 0.6 }
            });
        }

        function handleAnswer(isCorrect) {
            const winner = gameState.teams.find(t => t.id === gameState.highBidder);
            
            if (isCorrect) {
                // ميزة المزاد: إذا أجاب صح يكسب قيمة المزاد مضاعفة
                winner.points += (gameState.currentBid * 2);
                alert(`إجابة رائعة! ربحتم ${gameState.currentBid * 2} نقطة.`);
            } else {
                alert(`للأسف إجابة خاطئة. خسرتم قيمة المزاد.`);
            }

            document.getElementById('modal-reveal').style.display = 'none';
            gameState.currentLot++;
            startNewLot();
        }
    </script>
</body>
</html>
