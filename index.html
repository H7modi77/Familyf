<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لعبة المزاد | الإصدار الاحترافي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Cinzel+Decorative:wght@900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --gold: linear-gradient(135deg, #8a6d3b 0%, #d4af37 25%, #fcf6ba 50%, #d4af37 75%, #8a6d3b 100%);
            --royal-blue: #020612;
            --red-text: #ff0000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; user-select: none; }
        body { background-color: var(--royal-blue); color: white; height: 100vh; overflow: hidden; }

        .screen { position: absolute; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .screen.active { display: flex; animation: fadeIn 0.6s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .main-logo { font-family: 'Cinzel Decorative', cursive; font-size: 90px; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.5)); }

        /* نصوص التحميس الحمراء */
        .hype-text {
            position: absolute; color: var(--red-text); font-size: 60px; font-weight: 900;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.8); z-index: 100; pointer-events: none;
            animation: hypeAnim 1.2s ease-out forwards;
        }
        @keyframes hypeAnim {
            0% { transform: scale(0.3) rotate(-15deg); opacity: 0; }
            50% { opacity: 1; transform: scale(1.3) rotate(10deg); }
            100% { opacity: 0; transform: translateY(-150px) scale(1.6); }
        }

        /* قاعة المزاد */
        .price-tag { font-size: 110px; font-weight: 900; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .timer-auction { font-size: 70px; font-weight: 900; color: #ff3e3e; border: 4px solid #ff3e3e; width: 130px; height: 130px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 20px 0; box-shadow: 0 0 30px rgba(255, 62, 62, 0.3); }

        .leaderboard { position: fixed; top: 20px; right: 20px; width: 260px; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 20px; border: 1px solid rgba(212,175,55,0.3); backdrop-filter: blur(10px); }
        .team-row { display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .btn-auction { background: rgba(255,255,255,0.1); border: 2px solid white; color: white; padding: 15px 35px; border-radius: 50px; font-weight: 900; cursor: pointer; transition: 0.3s; font-size: 20px; }
        .btn-auction:hover { background: white; color: black; transform: scale(1.05); }
        .btn-auction.gold { background: var(--gold); color: black; border: none; }

        /* شاشة السؤال */
        .question-container { background: #000; padding: 40px; border-radius: 30px; border: 3px solid #d4af37; max-width: 800px; width: 95%; position: relative; }
        
        input, textarea { width: 100%; max-width: 450px; padding: 15px; border-radius: 12px; border: 2px solid #d4af37; background: #111; color: white; margin: 10px 0; text-align: center; font-size: 18px; }
        textarea { height: 150px; resize: none; }
    </style>
</head>
<body>

    <!-- 1. شاشة البداية -->
    <section id="screen-start" class="screen active">
        <h1 class="main-logo">الـمـزاد</h1>
        <button class="btn-auction gold" style="margin-top: 40px; padding: 20px 80px;" onclick="showScreen('screen-setup')">بدء المزاد</button>
    </section>

    <!-- 2. شاشة الإعدادات -->
    <section id="screen-setup" class="screen">
        <div class="question-container">
            <h2 style="margin-bottom: 20px;">تجهيز قاعة المزاد</h2>
            <input type="text" id="teams-input" placeholder="أسماء الفرق (افصل بـ ،)">
            <input type="number" id="budget-input" placeholder="ميزانية كل فريق">
            <input type="number" id="rounds-input" placeholder="عدد الأسئلة (الجولات)">
            <textarea id="questions-input" placeholder="اكتب الأسئلة هنا (كل سؤال في سطر منفصل)"></textarea>
            <button class="btn-auction gold" style="width: 100%;" onclick="startApp()">فتح المزاد 🔥</button>
        </div>
    </section>

    <!-- 3. شاشة المزاد -->
    <section id="screen-auction" class="screen">
        <div id="hype-container"></div>
        <div class="leaderboard" id="board"></div>

        <div style="font-size: 100px;" id="gavel">🔨</div>
        <div id="current-lot-text" style="color: #d4af37; font-weight: bold; font-size: 24px;">سؤال رقم 1</div>
        <div class="price-tag" id="price-display">0</div>
        <div class="timer-auction" id="auction-timer">15</div>
        
        <div style="display: flex; gap: 15px; flex-wrap: wrap; justify-content: center;" id="bid-btns"></div>
    </section>

    <!-- 4. شاشة الإجابة -->
    <div id="modal-answer" class="screen" style="background: rgba(0,0,0,0.96); z-index: 1000;">
        <div class="question-container">
            <h1 style="color: #d4af37; font-size: 50px;">تـم البيـع!</h1>
            <p id="winner-text" style="font-size: 25px; margin-bottom: 20px;"></p>
            
            <div id="ans-timer-display" style="font-size: 60px; font-weight: 900; color: #4ade80; margin-bottom: 20px;">20</div>
            
            <div id="question-display" style="font-size: 30px; font-weight: 900; margin-bottom: 30px;">السؤال يظهر هنا..</div>

            <div id="timer-controls">
                <button class="btn-auction" id="btn-start-ans-timer" style="background: #4ade80; color: black; border:none;" onclick="startAnswerTimer()">تشغيل مؤقت الإجابة ⏱️</button>
            </div>

            <div class="helpers" style="display: flex; gap: 10px; justify-content: center; margin-top: 20px;">
                <button class="btn-auction" style="font-size: 14px; border-color: #d4af37; color: #d4af37;" onclick="helper('time')">زيادة 20ث (-200)</button>
                <button class="btn-auction" style="font-size: 14px; border-color: #d4af37; color: #d4af37;" onclick="helper('skip')">تخطي السؤال (-200)</button>
            </div>

            <div style="display: flex; gap: 20px; margin-top: 40px; justify-content: center;">
                <button class="btn-auction" style="background: #4ade80; color: black; border:none;" onclick="solve(true)">إجابة صحيحة ✅</button>
                <button class="btn-auction" style="background: #ff3e3e; color: white; border:none;" onclick="solve(false)">إجابة خاطئة ❌</button>
            </div>
        </div>
    </div>

    <!-- 5. شاشة النهاية -->
    <section id="screen-winner" class="screen">
        <h1 class="main-logo" id="final-winner-text">مبروك للفائز!</h1>
        <button class="btn-auction gold" style="margin-top: 40px;" onclick="location.reload()">إعادة اللعبة</button>
    </section>

    <script>
        let game = {
            teams: [],
            questions: [],
            totalRounds: 0,
            currentRound: 1,
            curPrice: 0,
            curBidder: null,
            timer: 15,
            ansTimer: 20,
            timerInt: null,
            ansTimerInt: null,
            isLocked: false,
            hypeList: ["ادفع!", "يالله سهلة!", "انت كفوووو!", "لا تخليهم!", "سعر رهيب!", "زيد المزايدة!"]
        };

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function startApp() {
            const names = document.getElementById('teams-input').value.split('،').map(n => n.trim());
            const budget = parseInt(document.getElementById('budget-input').value) || 5000;
            const rounds = parseInt(document.getElementById('rounds-input').value);
            const qs = document.getElementById('questions-input').value.split('\n').filter(q => q.trim() !== "");

            if (names.length < 2 || isNaN(rounds) || qs.length < rounds) {
                return alert("تأكد من إدخال أسماء الفرق وعدد الجولات (يجب أن يتطابق عدد الأسئلة مع عدد الجولات)!");
            }

            game.teams = names.map((n, i) => ({ id: i, name: n, points: budget }));
            game.questions = qs;
            game.totalRounds = rounds;

            updateBoard();
            createBidBtns();
            showScreen('screen-auction');
            setInterval(spawnHype, 2500);
        }

        function spawnHype() {
            if (!document.getElementById('screen-auction').classList.contains('active')) return;
            const text = game.hypeList[Math.floor(Math.random() * game.hypeList.length)];
            const div = document.createElement('div');
            div.className = 'hype-text';
            div.innerText = text;
            div.style.left = (Math.random() * 60 + 20) + "%";
            div.style.top = (Math.random() * 50 + 20) + "%";
            document.getElementById('hype-container').appendChild(div);
            setTimeout(() => div.remove(), 1200);
        }

        function createBidBtns() {
            const container = document.getElementById('bid-btns');
            container.innerHTML = '';
            game.teams.forEach(t => {
                const btn = document.createElement('button');
                btn.className = 'btn-auction';
                btn.innerHTML = `${t.name}<br>+100`;
                btn.onclick = () => placeBid(t.id);
                container.appendChild(btn);
            });
        }

        function placeBid(id) {
            if (game.isLocked) return;
            const team = game.teams.find(t => t.id === id);
            const nextPrice = game.curPrice + 100;

            if (team.points < nextPrice) return alert("النقاط غير كافية!");

            game.curPrice = nextPrice;
            game.curBidder = id;
            game.timer = 15;
            document.getElementById('price-display').innerText = game.curPrice;
            document.getElementById('auction-timer').innerText = "15";

            if (!game.timerInt) {
                game.timerInt = setInterval(() => {
                    game.timer--;
                    document.getElementById('auction-timer').innerText = game.timer;
                    if (game.timer <= 0) {
                        clearInterval(game.timerInt);
                        game.timerInt = null;
                        finalizeAuction();
                    }
                }, 1000);
            }
        }

        function finalizeAuction() {
            if (game.curBidder === null) {
                alert("لم يتم المزايدة!");
                game.timer = 15;
                document.getElementById('auction-timer').innerText = "15";
                return;
            }
            game.isLocked = true;
            document.getElementById('gavel').style.transform = "rotate(-40deg)";
            
            setTimeout(() => {
                document.getElementById('gavel').style.transform = "rotate(0deg)";
                const winner = game.teams.find(t => t.id === game.curBidder);
                winner.points -= game.curPrice;
                updateBoard();

                showScreen('modal-answer');
                document.getElementById('winner-text').innerText = `المشتري: ${winner.name}`;
                document.getElementById('question-display').innerText = game.questions[game.currentRound - 1];
                document.getElementById('ans-timer-display').innerText = "20";
                document.getElementById('btn-start-ans-timer').style.display = 'inline-block';
            }, 500);
        }

        function startAnswerTimer() {
            document.getElementById('btn-start-ans-timer').style.display = 'none';
            game.ansTimer = 20;
            game.ansTimerInt = setInterval(() => {
                game.ansTimer--;
                document.getElementById('ans-timer-display').innerText = game.ansTimer;
                if (game.ansTimer <= 0) {
                    clearInterval(game.ansTimerInt);
                    alert("انتهى وقت الإجابة!");
                }
            }, 1000);
        }

        function helper(type) {
            const team = game.teams.find(t => t.id === game.curBidder);
            if (team.points < 200) return alert("نقاطك لا تكفي!");
            team.points -= 200;
            updateBoard();

            if (type === 'time') {
                game.ansTimer += 20;
                document.getElementById('ans-timer-display').innerText = game.ansTimer;
            } else if (type === 'skip') {
                clearInterval(game.ansTimerInt);
                alert("تم تخطي السؤال");
                solve(false);
            }
        }

        function solve(correct) {
            clearInterval(game.ansTimerInt);
            const team = game.teams.find(t => t.id === game.curBidder);
            if (correct) {
                team.points += (game.curPrice * 2);
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            }

            if (game.currentRound >= game.totalRounds) {
                endGame();
            } else {
                game.currentRound++;
                resetLot();
            }
        }

        function resetLot() {
            game.curPrice = 0;
            game.curBidder = null;
            game.isLocked = false;
            game.timer = 15;
            document.getElementById('price-display').innerText = "0";
            document.getElementById('auction-timer').innerText = "15";
            document.getElementById('current-lot-text').innerText = `سؤال رقم ${game.currentRound}`;
            updateBoard();
            showScreen('screen-auction');
        }

        function updateBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '<h3 style="color:#d4af37; margin-bottom:10px;">لوحة المزاد</h3>';
            [...game.teams].sort((a,b) => b.points - a.points).forEach(t => {
                board.innerHTML += `<div class="team-row"><span>${t.name}</span><span>${t.points}</span></div>`;
            });
        }

        function endGame() {
            const winner = [...game.teams].sort((a,b) => b.points - a.points)[0];
            document.getElementById('final-winner-text').innerText = `بطل المزاد هو: ${winner.name} 🎉`;
            showScreen('screen-winner');
        }
    </script>
</body>
</html>
