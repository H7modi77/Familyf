<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مافيارهون | نظام تصفية الأهداف</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --green: #00ff41; --red: #ff003c; --blue: #00d4ff; --bg: #020508;
        }

        * { box-sizing: border-box; transition: 0.3s; }
        body {
            font-family: 'Cairo', sans-serif; background-color: var(--bg); color: var(--green);
            margin: 0; height: 100vh; overflow: hidden;
        }

        .main-container {
            width: 96vw; height: 94vh; margin: 3vh auto;
            background: rgba(10, 20, 30, 0.98); border: 1px solid rgba(0,255,65,0.2);
            display: flex; flex-direction: column; position: relative;
            border-radius: 15px; box-shadow: 0 0 50px #000;
        }

        .sys-header {
            padding: 15px; border-bottom: 1px solid rgba(0,255,65,0.2);
            display: flex; justify-content: space-between; font-family: 'Share Tech Mono';
        }

        .screen { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 40px; }
        .screen.active { display: flex; animation: fadeIn 0.5s ease; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .counter-box {
            display: flex; align-items: center; background: rgba(0,255,65,0.05);
            padding: 20px; border: 2px solid var(--green); border-radius: 10px; margin: 20px;
        }
        .counter-btn {
            background: transparent; color: var(--green); border: 1px solid var(--green);
            width: 50px; height: 50px; font-size: 1.5rem; cursor: pointer;
        }
        .counter-val { font-size: 3rem; margin: 0 30px; font-family: 'Share Tech Mono'; }

        .db-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px; width: 100%; max-width: 1000px; margin: 20px 0;
        }
        .db-card {
            background: rgba(0,20,30,0.8); border: 1px solid rgba(0,255,65,0.2);
            padding: 15px; text-align: center; cursor: pointer;
        }
        .db-card.selected { border-color: var(--green); background: rgba(0,255,65,0.2); }
        .db-card.skip-card { border-color: var(--red); color: var(--red); }
        .db-card img { width: 100px; height: 100px; border: 1px solid #333; margin-bottom: 10px; }

        .action-btn {
            background: transparent; color: var(--green); border: 1px solid var(--green);
            padding: 12px 40px; cursor: pointer; font-weight: 900; margin: 10px; font-family: 'Cairo';
        }
        .action-btn:hover { background: var(--green); color: black; box-shadow: 0 0 20px var(--green); }

        #termination-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: none;
            flex-direction: column; align-items: center; justify-content: center;
            text-align: center;
        }
        .alert-bar {
            width: 100%; background: var(--red); color: white; padding: 10px;
            position: absolute; top: 0; font-weight: 900; letter-spacing: 5px;
            animation: blink 0.5s infinite;
        }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } }

        .eliminated-card { transform: scale(0); opacity: 0; }
        .eliminated-card.show { animation: finalReveal 0.8s cubic-bezier(0.17, 0.89, 0.32, 1.28) forwards; }
        @keyframes finalReveal { to { transform: scale(1.2); opacity: 1; } }

        .role-img-large {
            width: 250px; height: 250px; border: 5px solid var(--green);
            box-shadow: 0 0 50px var(--green); margin: 20px;
        }
        .n-in { background: transparent; border: 1px solid var(--green); color: var(--green); padding: 10px; text-align: center; width: 100%; }

    </style>
</head>
<body>

<div class="main-container">
    <div class="sys-header">
        <span>النظام: متصل - قاعدة بيانات MAFIARHON</span>
        <span id="clock">00:00:00</span>
    </div>

    <div id="scr-start" class="screen active">
        <h1>مافيارهون</h1>
        <p>تحديد عدد أهداف العملية</p>
        <div class="counter-box">
            <button class="counter-btn" onclick="changeCount(-1)">-</button>
            <div class="counter-val" id="p-count">5</div>
            <button class="counter-btn" onclick="changeCount(1)">+</button>
        </div>
        <button class="action-btn" onclick="goToNames()">بدء التهيئة</button>
    </div>

    <div id="scr-names" class="screen">
        <h2>تسجيل الأسماء</h2>
        <div id="names-grid" class="db-grid" style="overflow-y:auto; max-height:50vh;"></div>
        <button class="action-btn" onclick="setupRoles()">توزيع المهمات</button>
    </div>

    <div id="scr-reveal" class="screen">
        <h2 id="rev-user">---</h2>
        <div class="db-card" style="width: 250px; cursor: default;">
            <img id="rev-img" src="" style="display:none;">
            <h3 id="rev-role-name">بيانات مشفرة</h3>
        </div>
        <button class="action-btn" id="rev-btn" onclick="handleReveal()">فك التشفير</button>
    </div>

    <div id="scr-night" class="screen">
        <h2 id="night-title">---</h2>
        <p id="night-desc">---</p>
        <div id="night-grid" class="db-grid"></div>
        <button class="action-btn" onclick="confirmNightAction()">تأكيد القرار</button>
    </div>

    <div id="scr-det" class="screen">
        <div style="border: 2px solid var(--blue); padding: 40px; text-align: center;">
            <h1 style="color: var(--blue);">نتيجة الفحص</h1>
            <div id="det-result" style="font-size: 3rem; margin: 20px 0;">---</div>
            <button class="action-btn" onclick="showSummary()">إغلاق التقرير</button>
        </div>
    </div>

    <div id="scr-summary" class="screen">
        <h2>تقرير العمليات الصباحي</h2>
        <div id="summary-content" style="border-right: 4px solid var(--blue); padding: 20px; font-size: 1.2rem; min-width: 300px;"></div>
        <button class="action-btn" onclick="startDiscussion()">فتح النقاش</button>
    </div>

    <div id="scr-discuss" class="screen">
        <h2>النقاش جارٍ...</h2>
        <div id="timer" style="font-size: 6rem; font-family: 'Share Tech Mono';">03:30</div>
        <div id="mute-msg" style="color: var(--red);"></div>
        <button class="action-btn" onclick="goToVoting()">منصة التصويت</button>
    </div>

    <div id="scr-vote" class="screen">
        <h2>من سيتم طرده؟</h2>
        <div id="vote-grid" class="db-grid"></div>
        <button class="action-btn" onclick="executeVote()">تنفيذ الطرد</button>
    </div>
</div>

<div id="termination-overlay">
    <div class="alert-bar">تنبيه: تصفية هوية نشطة</div>
    <h1 id="term-status" style="font-family: 'Share Tech Mono';">جاري سحب الصلاحيات...</h1>
    <div id="elim-card" class="eliminated-card">
        <h2 id="elim-name" style="font-size: 2.5rem; margin: 0;">الاسم</h2>
        <img id="elim-role-img" class="role-img-large" src="">
        <h1 id="elim-role-text" style="font-size: 3rem;">المهمة</h1>
        <button class="action-btn" onclick="finishElimination()">العودة للنظام</button>
    </div>
</div>

<div id="win-scr" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:black; z-index:10000; flex-direction:column; align-items:center; justify-content:center;">
    <h1 id="win-msg" style="font-size: 4rem;">---</h1>
    <button class="action-btn" onclick="location.reload()">إعادة تشغيل</button>
</div>

<script>
    const ROLES = {
        M: { n: 'مافيا القتل', img: 'M.png', c: '#ff003c' },
        MM: { n: 'مافيا السكيت', img: 'MM.png', c: '#ff003c' },
        D: { n: 'الطبيب', img: 'D.png', c: '#00d4ff' },
        C: { n: 'المحقق', img: 'C.png', c: '#f1fa8c' },
        P: { n: 'مواطن بريء', img: 'P.png', c: '#00ff41' }
    };

    let pCount = 5, players = [], currentIdx = 0, nPhase = "kill";
    let acts = { kill: null, mute: null, doc: null, det: null };
    let tempTarget = null;

    function changeCount(v) {
        pCount = Math.max(5, Math.min(15, pCount + v));
        document.getElementById('p-count').innerText = pCount;
    }

    function scr(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function goToNames() {
        let h = '';
        for (let i = 0; i < pCount; i++) h += `<input type="text" class="n-in" placeholder="الاسم ${i+1}">`;
        document.getElementById('names-grid').innerHTML = h;
        scr('scr-names');
    }

    function setupRoles() {
        let names = Array.from(document.querySelectorAll('.n-in')).map(i => i.value || `لاعب_${Math.random().toString(16).slice(2,5)}`);
        let rPool = [ROLES.M, ROLES.MM, ROLES.D, ROLES.C];
        while (rPool.length < names.length) rPool.push(ROLES.P);
        rPool = rPool.sort(() => Math.random() - 0.5);
        players = names.map((n, i) => ({ name: n, role: rPool[i], alive: true, muted: false }));
        currentIdx = 0;
        updateRev();
        scr('scr-reveal');
    }

    function updateRev() {
        let p = players[currentIdx];
        document.getElementById('rev-user').innerText = `المستهدف: ${p.name}`;
        document.getElementById('rev-img').style.display = 'none';
        document.getElementById('rev-role-name').innerText = "بيانات مشفرة";
        document.getElementById('rev-btn').innerText = "فك التشفير";
    }

    function handleReveal() {
        let p = players[currentIdx], btn = document.getElementById('rev-btn');
        if (btn.innerText === "فك التشفير") {
            document.getElementById('rev-img').src = p.role.img;
            document.getElementById('rev-img').style.display = 'block';
            document.getElementById('rev-role-name').innerText = p.role.n;
            document.getElementById('rev-role-name').style.color = p.role.c;
            btn.innerText = "التالي";
        } else {
            currentIdx++;
            if (currentIdx < players.length) updateRev();
            else startNight();
        }
    }

    function startNight() {
        nPhase = "kill";
        acts = { kill: null, mute: null, doc: null, det: null };
        updateNightUI();
        scr('scr-night');
    }

    function updateNightUI() {
        const info = {
            kill: ["تصفية المافيا", "اختر ضحية لحذفها من النظام", "#ff003c"],
            mute: ["تشويش السكيت", "اختر شخصاً لإسكاته", "#ff003c"],
            doc: ["حماية الطبيب", "اختر شخصاً لتأمينه", "#00d4ff"],
            det: ["تحقيق المحقق", "اختر شخصاً لفحصه", "#f1fa8c"]
        };
        document.getElementById('night-title').innerText = info[nPhase][0];
        document.getElementById('night-title').style.color = info[nPhase][2];
        document.getElementById('night-desc').innerText = info[nPhase][1];
        
        const g = document.getElementById('night-grid');
        g.innerHTML = `<div class="db-card skip-card" id="skip-opt"><h4>تخطي المهمة</h4></div>`;
        document.getElementById('skip-opt').onclick = () => {
            document.querySelectorAll('.db-card').forEach(x => x.classList.remove('selected'));
            document.getElementById('skip-opt').classList.add('selected');
            tempTarget = "skip";
        };

        players.filter(p => p.alive).forEach(p => {
            let d = document.createElement('div');
            d.className = 'db-card';
            d.innerHTML = `<h4>${p.name}</h4>`;
            d.onclick = () => {
                document.querySelectorAll('.db-card').forEach(x => x.classList.remove('selected'));
                d.classList.add('selected');
                tempTarget = p;
            };
            g.appendChild(d);
        });
        tempTarget = null;
    }

    function confirmNightAction() {
        if (!tempTarget) return alert("الرجاء اختيار هدف أو الضغط على تخطي");
        acts[nPhase] = tempTarget === "skip" ? null : tempTarget;

        if (nPhase === "kill") nPhase = "mute";
        else if (nPhase === "mute") nPhase = "doc";
        else if (nPhase === "doc") nPhase = "det";
        else {
            if (acts.det) {
                let isM = acts.det.role.n.includes("مافيا");
                document.getElementById('det-result').innerText = isM ? "إيجابي: مافيا ⚠️" : "سلبي: مواطن ✅";
                document.getElementById('det-result').style.color = isM ? "#ff003c" : "#00ff41";
                scr('scr-det');
            } else {
                showSummary();
            }
            return;
        }
        updateNightUI();
    }

    function showSummary() {
        let dead = null;
        let survived = false;

        if (acts.kill) {
            if (acts.doc && acts.kill.name === acts.doc.name) {
                survived = true;
            } else {
                dead = acts.kill;
                dead.alive = false;
            }
        }

        players.forEach(p => p.muted = false);
        if (acts.mute) acts.mute.muted = true;

        let resHTML = "";
        if (survived) {
            resHTML += `• محاولة تصفية: تم إفشال العملية بنجاح ✅<br>`;
        } else if (dead) {
            resHTML += `• تم حذف هدف: <b style="color:var(--red)">${dead.name}</b><br>`;
            resHTML += `• المهمة المسجلة للهدف: <b style="color:${dead.role.c}">${dead.role.n}</b> 💀<br>`;
        } else {
            resHTML += `• لم تحدث أي عمليات تصفية الليلة.<br>`;
        }

        if (acts.mute) {
            resHTML += `• تم تشويش اتصال العضو: ${acts.mute.name} (أبكم) 🔇<br>`;
        }

        document.getElementById('summary-content').innerHTML = resHTML;
        scr('scr-summary');
    }

    function startDiscussion() {
        scr('scr-discuss');
        let t = 210, mP = players.find(p => p.muted);
        document.getElementById('mute-msg').innerText = mP ? `⚠️ تنبيه: ${mP.name} معزول صوتياً عن النظام!` : "";
        let inv = setInterval(() => {
            let min = Math.floor(t/60), sec = t%60;
            document.getElementById('timer').innerText = `${min}:${sec<10?'0'+sec:sec}`;
            if (t <= 0) { clearInterval(inv); goToVoting(); }
            t--;
        }, 1000);
        window.activeInv = inv;
    }

    function goToVoting() {
        clearInterval(window.activeInv);
        const g = document.getElementById('vote-grid');
        g.innerHTML = '';
        players.filter(p => p.alive).forEach(p => {
            let d = document.createElement('div');
            d.className = 'db-card';
            d.innerHTML = `<h4>${p.name}</h4><input type="number" id="v-${p.name}" value="0" style="width:60px;">`;
            g.appendChild(d);
        });
        scr('scr-vote');
    }

    function executeVote() {
        let max = -1, target = null, tie = false;
        players.filter(p => p.alive).forEach(p => {
            let v = +document.getElementById(`v-${p.name}`).value;
            if (v > max) { max = v; target = p; tie = false; }
            else if (v === max && v > 0) tie = true;
        });

        if (tie || max === 0) {
            alert("تعادل في الأصوات أو لم يصوت أحد! النظام يتخطى التصفية.");
            startNight();
        } else {
            showTerminationReveal(target);
        }
    }

    function showTerminationReveal(player) {
        const overlay = document.getElementById('termination-overlay');
        const card = document.getElementById('elim-card');
        overlay.style.display = 'flex';
        card.classList.remove('show');
        document.getElementById('term-status').innerText = "جاري تدمير صلاحيات الوصول...";
        setTimeout(() => {
            document.getElementById('elim-name').innerText = player.name;
            document.getElementById('elim-role-img').src = player.role.img;
            document.getElementById('elim-role-text').innerText = player.role.n;
            document.getElementById('elim-role-text').style.color = player.role.c;
            player.alive = false;
            card.classList.add('show');
        }, 1500);
    }

    function finishElimination() {
        document.getElementById('termination-overlay').style.display = 'none';
        checkWin();
    }

    function checkWin() {
        let m = players.filter(p => p.alive && p.role.n.includes("مافيا")).length;
        let c = players.filter(p => p.alive && !p.role.n.includes("مافيا")).length;
        if (m === 0) endGame("تم تنظيف النظام! انتصار المواطنين ✅", "#00ff41");
        else if (m >= c) endGame("سقط النظام! سيطرة المافيا ⚠️", "#ff003c");
        else startNight();
    }

    function endGame(txt, col) {
        document.getElementById('win-msg').innerText = txt;
        document.getElementById('win-msg').style.color = col;
        document.getElementById('win-scr').style.display = 'flex';
    }

    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString();
    }, 1000);
</script>
</body>
</html>
