<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الموسوعة الملكية | مسابقة الحروف</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            --gold-solid: #b38728;
            --dark-bg: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        body {
            background-color: var(--dark-bg);
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            color: white;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* رأس الصفحة */
        .main-header {
            margin-top: 40px;
            text-align: center;
            animation: fadeInDown 1.5s ease-out;
        }

        .main-header h1 {
            font-family: 'Amiri', serif;
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            background: var(--gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
            filter: drop-shadow(0 5px 15px rgba(179, 135, 40, 0.4));
        }

        /* شبكة الحروف */
        .alphabet-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
            gap: 15px;
            max-width: 1000px;
            width: 90%;
            padding: 30px;
            animation: fadeIn 2s ease-in;
        }

        .letter-btn {
            aspect-ratio: 1/1;
            border-radius: 50%;
            background: var(--glass);
            border: 2px solid var(--gold-solid);
            color: var(--gold-solid);
            font-size: 1.8rem;
            font-family: 'Amiri', serif;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }

        .letter-btn::after {
            content: "";
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg);
            transition: 0.5s;
        }

        .letter-btn:hover {
            background: var(--gold);
            color: black;
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 0 40px rgba(179, 135, 40, 0.6);
        }

        .letter-btn:hover::after { left: 100%; }

        /* شاشة السؤال */
        #question-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 90%;
            max-width: 900px;
            margin-top: 20px;
        }

        .question-card {
            background: rgba(10, 10, 10, 0.8);
            border: 3px solid;
            border-image: var(--gold) 1;
            padding: 50px 30px;
            text-align: center;
            width: 100%;
            position: relative;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 80px rgba(0,0,0,1);
            border-radius: 4px;
        }

        .q-number {
            font-size: 1.1rem;
            color: var(--gold-solid);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 30px;
        }

        #question-text {
            font-size: clamp(1.5rem, 5vw, 2.8rem);
            line-height: 1.4;
            margin-bottom: 50px;
            min-height: 120px;
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        /* منطقة الإجابة */
        #answer-box {
            opacity: 0;
            transform: translateY(20px);
            transition: 0.5s;
            background: var(--gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.2rem;
            font-weight: 900;
            font-family: 'Amiri', serif;
            margin-top: 20px;
            padding: 10px;
            border-top: 1px solid rgba(179, 135, 40, 0.2);
        }

        #answer-box.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* الأزرار */
        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-top: 40px;
        }

        .btn-royal {
            padding: 12px 30px;
            border: 1px solid var(--gold-solid);
            background: transparent;
            color: var(--gold-solid);
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            min-width: 120px;
        }

        .btn-royal:hover {
            background: var(--gold-solid);
            color: black;
        }

        .btn-reveal {
            background: var(--gold);
            color: black;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            box-shadow: 0 0 20px rgba(179, 135, 40, 0.4);
        }

        .back-link {
            margin-top: 40px;
            color: #888;
            cursor: pointer;
            font-size: 1.1rem;
            transition: 0.3s;
        }

        .back-link:hover { color: var(--gold-solid); }

        /* أنيميشن */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .fade-in { animation: fadeIn 0.6s ease-out; }

        @media (max-width: 600px) {
            .alphabet-grid { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>

        function startQuiz(char) {
            currentLetter = char;
            currentQIndex = 0;
            document.getElementById('header').style.display = 'none';
            document.getElementById('alphabet-grid').style.display = 'none';
            document.getElementById('question-screen').style.display = 'flex';
            document.getElementById('letter-title').innerText = "حرف " + char;
            showQuestion();
        }

        function showQuestion() {
            const data = quizData[currentLetter][currentQIndex];
            document.getElementById('q-idx').innerText = currentQIndex + 1;
            document.getElementById('question-text').innerText = data.q;
            document.getElementById('answer-text').innerText = data.a;
            
            // إعادة ضبط الإجابة لتكون مخفية
            document.getElementById('answer-box').classList.remove('visible');
            
            const card = document.querySelector('.question-card');
            card.classList.remove('fade-in');
            void card.offsetWidth; 
            card.classList.add('fade-in');
        }

        function revealAnswer() {
            document.getElementById('answer-box').classList.add('visible');
        }

        function nextQuestion() {
            if (currentQIndex < quizData[currentLetter].length - 1) {
                currentQIndex++;
                showQuestion();
            }
        }

        function prevQuestion() {
            if (currentQIndex > 0) {
                currentQIndex--;
                showQuestion();
            }
        }

        function randomQuestion() {
            currentQIndex = Math.floor(Math.random() * quizData[currentLetter].length);
            showQuestion();
        }

        function goBack() {
            document.getElementById('header').style.display = 'block';
            document.getElementById('alphabet-grid').style.display = 'grid';
            document.getElementById('question-screen').style.display = 'none';
