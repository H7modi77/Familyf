<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>MAFIARHON | SECURE DATABASE</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --db-green: #00ff41;
            --db-red: #ff003c;
            --db-blue: #00d4ff;
            --bg-dark: #050a0f;
            --panel-bg: rgba(10, 20, 30, 0.95);
            --border: 1px solid rgba(0, 255, 65, 0.3);
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }
        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-dark);
            color: var(--db-green);
            margin: 0; height: 100vh; overflow: hidden;
            background-image: linear-gradient(rgba(0, 255, 65, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 255, 65, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .container {
            width: 96vw; height: 94vh; margin: 3vh auto;
            background: var(--panel-bg); border: var(--border);
            display: flex; flex-direction: column; position: relative;
            box-shadow: 0 0 40px rgba(0,0,0,1);
        }

        .header {
            padding: 10px 20px; border-bottom: var(--border);
            display: flex; justify-content: space-between;
            font-family: 'Share Tech Mono', monospace; font-size: 0.9rem;
            background: rgba(0, 255, 65, 0.05);
        }

        .page { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 30px; animation: fadeIn 0.5s ease; }
        .page.active { display: flex; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* الكروت والشبكة */
        .db-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px; width: 100%; max-width: 1000px; margin: 20px 0;
        }

        .db-card {
            background: rgba(0, 20, 30, 0.8); border: 1px solid rgba(0, 255, 65, 0.2);
            padding: 15px; text-align: center; cursor: pointer;
        }
        .db-card:hover { border-color: var(--db-green); box-shadow: 0 0 15px var(--db-green); }
        .db-card.selected { background: rgba(0, 255, 65, 0.2); border-color: var(--db-green); }
        .db-card img { width: 100%; height: auto; border: 1px solid #444; margin-bottom: 10px; }

        /* الأزرار */
        button {
            background: transparent; color: var(--db-green); border: 1px solid var(--db-green);
            padding: 12px 35px; font-family: 'Share Tech Mono', monospace;
            cursor: pointer; letter-spacing: 2px; font-weight: bold; margin: 10px;
        }
        button:hover { background: var(--db-green); color: black; box-shadow: 0 0 20px var(--db-green); }

        /* الشاشات الخاصة */
        .report-box {
            width: 100%; max-width: 600px; background: rgba(0,0,0,0.5);
            border-right: 4px solid var(--db-blue); padding: 20px; font-family: 'Share Tech Mono';
        }
        .report-line { margin: 15px 0; font-size: 1.2rem; }

        .detective-result-screen {
            text-align: center; padding: 50px; border: 2px dashed var(--db-blue);
        }

        /* شاشة الفوز */
        #win-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2000; display: none; flex-direction: column;
            align-items: center; justify-content: center; background: black;
        }

        input { background: transparent; border: 1px solid var(--db-green); color: var(--db-green); padding: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <span>SYSTEM_STATUS: ACTIVE</span>
        <span id="sys-clock">00:00:00</span>
    </div>

    <!-- 1. البداية -->
    <div id="p-start" class="page active">
        <h1 style="font-size: 3rem; letter-spacing: 10px;">MAFIARHON_DB</h1>
        <input type="number" id="p-count" placeholder="COUNT: 5-15">
        <button onclick="setupNames()">ACCESS</button>
    </div>

    <!-- 2. الأسماء -->
    <div id="p-names" class="page">
        <h2>IDENTIFY SUBJECTS</h2>
        <div id="names-list" class="db-grid" style="max-height: 50vh; overflow-y: auto;"></div>
        <button onclick="startRoles()">INITIATE ROLES</button>
    </div>

    <!-- 3. كشف الأدوار -->
    <div id="p-reveal" class="page">
        <h2 id="rev-name">---</h2>
        <div class="db-card" style="width: 250px;">
            <img id="rev-img" src="" style="display:none;">
            <h3 id="rev-role">ENCRYPTED</h3>
        </div>
        <button id="rev-btn" onclick="revealMe()">DECRYPT</button>
    </div>

    <!-- 4. الليل (يتم تكرارها لكل دور) -->
    <div id="p-night" class="page">
        <h2 id="night-role-title">ROLE PHASE</h2>
        <p id="night-desc">---</p>
        <div id="night-grid" class="db-grid"></div>
        <button onclick="confirmAction()">CONFIRM SELECTION</button>
    </div>

    <!-- 5. صفحة المحقق الخاصة -->
    <div id="p-det-result" class="page">
        <div class="detective-result-screen">
            <h1 style="color: var(--db-blue);">INTEL REPORT</h1>
            <p>Subject Analysis Result:</p>
            <div id="det-data" style="font-size: 3rem; margin: 30px 0;">---</div>
            <button onclick="goToSummary()">CONTINUE TO SYSTEM LOGS</button>
        </div>
    </div>

    <!-- 6. صفحة التلخيص -->
    <div id="p-summary" class="page">
        <h2 style="color: var(--db-blue);">NIGHTLY INCIDENT REPORT</h2>
        <div class="report-box" id="summary-report"></div>
        <button onclick="startDiscuss()">START DISCUSSION</button>
    </div>

    <!-- 7. النقاش -->
    <div id="p-discuss" class="page">
        <h2>COMMUNICATION OPEN</h2>
        <div style="font-size: 6rem; font-family: 'Share Tech Mono';" id="timer">03:30</div>
        <div id="mute-alert" style="color: var(--db-red);"></div>
        <button onclick="startVote()">VOTING TERMINAL</button>
    </div>

    <!-- 8. التصويت -->
    <div id="p-vote" class="page">
        <h2>TERMINATION SELECTION</h2>
        <div id="vote-grid" class="db-grid"></div>
        <button onclick="executeVote()">EXECUTE SELECTION</button>
    </div>
</div>

<div id="win-overlay">
    <h1 id="win-msg" style="font-size: 4rem;">---</h1>
    <button onclick="location.reload()">REBOOT</button>
</div>

<script>
    const DATA = {
        M: { name: 'مافيا القتل', img: 'M.png', c: '#ff003c' },
        MM: { name: 'مافيا السكيت', img: 'MM.png', c: '#ff003c' },
        D: { name: 'الطبيب', img: 'D.png', c: '#00d4ff' },
        C: { name: 'المحقق', img: 'C.png', c: '#f1fa8c' },
        P: { name: 'مواطن', img: 'P.png', c: '#00ff41' }
    };

    let players = [], curIdx = 0, phase = "kill";
    let acts = { kill: null, mute: null, doc: null, det: null };
    let selected = null;

    function show(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function setupNames() {
        let n = document.getElementById('p-count').value;
        if(n<5 || n>15) return;
        let h = '';
        for(let i=0; i<n; i++) h += `<input type="text" class="n-in" placeholder="ID_${i+1}">`;
        document.getElementById('names-list').innerHTML = h;
        show('p-names');
    }

    function startRoles() {
        let names = Array.from(document.querySelectorAll('.n-in')).map(i => i.value || `SUB_${Math.random().toString(16).slice(2,5)}`);
        let roles = [DATA.M, DATA.MM, DATA.D, DATA.C];
        while(roles.length < names.length) roles.push(DATA.P);
        roles = roles.sort(() => Math.random() - 0.5);

        players = names.map((n, i) => ({ name: n, role: roles[i], alive: true, muted: false }));
        curIdx = 0;
        updateReveal();
        show('p-reveal');
    }

    function updateReveal() {
        let p = players[curIdx];
        document.getElementById('rev-name').innerText = `USER: ${p.name}`;
        document.getElementById('rev-img').style.display = 'none';
        document.getElementById('rev-role').innerText = "ENCRYPTED";
        document.getElementById('rev-btn').innerText = "DECRYPT";
    }

    function revealMe() {
        let p = players[curIdx];
        if(document.getElementById('rev-role').innerText === "ENCRYPTED") {
            document.getElementById('rev-img').src = p.role.img;
            document.getElementById('rev-img').style.display = 'block';
            document.getElementById('rev-role').innerText = p.role.name;
            document.getElementById('rev-role').style.color = p.role.c;
            document.getElementById('rev-btn').innerText = "NEXT USER";
        } else {
            curIdx++;
            if(curIdx < players.length) { updateReveal(); }
            else { startNight(); }
        }
    }

    function startNight() {
        phase = "kill";
        updateNight();
        show('p-night');
    }

    function updateNight() {
        let t = { kill: "MAFIA ATTACK", mute: "MAFIA SILENCER", doc: "SURGEON PROTECTION", det: "INVESTIGATOR" };
        let d = { kill: "اختر الضحية للتصفية", mute: "اختر الشخص المراد منعه من الكلام", doc: "اختر الشخص الذي تريد حمايته", det: "اختر الشخص لمعرفة هويته" };
        document.getElementById('night-role-title').innerText = t[phase];
        document.getElementById('night-desc').innerText = d[phase];
        
        const g = document.getElementById('night-grid');
        g.innerHTML = '';
        players.filter(p => p.alive).forEach(p => {
            let c = document.createElement('div');
            c.className = 'db-card';
            c.innerHTML = `<h4>${p.name}</h4>`;
            c.onclick = () => {
                document.querySelectorAll('.db-card').forEach(x => x.classList.remove('selected'));
                c.classList.add('selected');
                selected = p;
            };
            g.appendChild(c);
        });
    }

    function confirmAction() {
        if(!selected) return;
        acts[phase] = selected;
        if(phase === "kill") phase = "mute";
        else if(phase === "mute") phase = "doc";
        else if(phase === "doc") phase = "det";
        else { showDetResult(); return; }
        selected = null;
        updateNight();
    }

    function showDetResult() {
        let isM = acts.det.role.name.includes("مافيا");
        document.getElementById('det-data').innerText = isM ? "POSITIVE: MAFIA" : "NEGATIVE: CITIZEN";
        document.getElementById('det-data').style.color = isM ? DATA.M.c : DATA.P.c;
        show('p-det-result');
    }

    function goToSummary() {
        let dead = null;
        let killSuccess = acts.kill.name !== acts.doc.name;
        if(killSuccess) {
            dead = acts.kill;
            dead.alive = false;
        }

        players.forEach(p => p.muted = false);
        acts.mute.muted = true;

        document.getElementById('summary-report').innerHTML = `
            <div class="report-line"># ATTACK_LOG: ${acts.kill.name} TARGETED.</div>
            <div class="report-line"># MEDICAL_LOG: DOCTOR PROTECTED ${acts.doc.name}.</div>
            <div class="report-line" style="color:${killSuccess?'red':'cyan'}"># RESULT: ${killSuccess ? dead.name + ' ELIMINATED' : 'ATTACK DEFLECTED'}.</div>
            <div class="report-line"># SYSTEM_LOG: ${acts.mute.name} COMM_LINK_MUTED.</div>
        `;
        show('p-summary');
    }

    function startDiscuss() {
        show('p-discuss');
        let t = 210, m = players.find(p => p.muted);
        document.getElementById('mute-alert').innerText = m ? `[!] ACCESS DENIED FOR: ${m.name}` : "";
        let iv = setInterval(() => {
            let min = Math.floor(t/60), sec = t%60;
            document.getElementById('timer').innerText = `${min}:${sec<10?'0'+sec:sec}`;
            if(t <= 0) clearInterval(iv);
            t--;
        }, 1000);
        window.dIv = iv;
    }

    function startVote() {
        clearInterval(window.dIv);
        const g = document.getElementById('vote-grid');
        g.innerHTML = '';
        players.filter(p => p.alive).forEach(p => {
            let c = document.createElement('div');
            c.className = 'db-card';
            c.innerHTML = `<h4>${p.name}</h4><input type="number" class="v-in" id="v-${p.name}" value="0">`;
            g.appendChild(c);
        });
        show('p-vote');
    }

    function executeVote() {
        let max = -1, target = null, tie = false;
        players.filter(p => p.alive).forEach(p => {
            let v = +document.getElementById(`v-${p.name}`).value;
            if(v > max) { max = v; target = p; tie = false; }
            else if(v === max && v > 0) tie = true;
        });

        if(tie || max === 0) alert("NO CONSENSUS: NO ELIMINATION");
        else {
            alert(`TERMINATING: ${target.name}\nROLE: ${target.role.name}`);
            target.alive = false;
        }
        checkWin();
    }

    function checkWin() {
        let m = players.filter(p => p.alive && p.role.name.includes("مافيا")).length;
        let c = players.filter(p => p.alive && !p.role.name.includes("مافيا")).length;

        if(m === 0) { win("CITIZENS WIN", "#00ff41"); }
        else if(m >= c) { win("MAFIA WIN", "#ff003c"); }
        else { startNight(); }
    }

    function win(txt, col) {
        document.getElementById('win-msg').innerText = txt;
        document.getElementById('win-msg').style.color = col;
        document.getElementById('win-overlay').style.display = 'flex';
    }

    setInterval(() => {
        document.getElementById('sys-clock').innerText = new Date().toLocaleTimeString();
    }, 1000);
</script>

</body>
</html>
