<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mafiarhon | مافيارهون</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;900&family=Orbitron:wght@500;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050507;
            --panel: #111116;
            --mafia: #e63946;
            --doctor: #457b9d;
            --detective: #f1fa8c;
            --citizen: #a8dadc;
            --accent: #7209b7;
            --text: #ffffff;
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* أنيميشن الخلفية */
        .bg-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(114, 9, 183, 0.1) 0%, transparent 80%);
            z-index: -1;
        }

        .container {
            width: 95vw;
            height: 90vh;
            background: var(--panel);
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            position: relative;
        }

        /* الصفحات */
        .page {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            height: 100%;
            overflow-y: auto;
        }

        .page.active { display: flex; animation: slideIn 0.6s forwards; }

        @keyframes slideIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        h1 { font-family: 'Orbitron', sans-serif; font-size: 3.5rem; color: var(--mafia); letter-spacing: 8px; margin: 0; text-shadow: 0 0 30px rgba(230, 57, 70, 0.4); }
        h2 { font-size: 2rem; margin-bottom: 30px; border-bottom: 2px solid var(--accent); padding-bottom: 10px; }

        /* الأزرار */
        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            margin: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        button:hover { transform: translateY(-3px); box-shadow: 0 8px 25px var(--accent); filter: brightness(1.2); }
        button:disabled { background: #444; cursor: not-allowed; transform: none; }

        /* الكروت */
        .player-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
            padding: 20px;
        }

        .role-card {
            background: #1a1a24;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            border: 2px solid transparent;
            cursor: pointer;
        }

        .role-card img { width: 100px; height: 100px; border-radius: 50%; margin-bottom: 15px; border: 3px solid var(--accent); object-fit: cover; }
        .role-card.selected { border-color: var(--accent); background: #252533; transform: scale(1.05); }
        .role-card.dead { filter: grayscale(1) opacity(0.4); pointer-events: none; }

        /* المدخلات */
        .input-group { margin: 15px; width: 100%; max-width: 400px; }
        input {
            width: 100%;
            padding: 12px;
            background: #252533;
            border: 1px solid #444;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            text-align: center;
        }

        /* العداد */
        .timer-circle {
            width: 180px; height: 180px;
            border-radius: 50%;
            border: 8px solid var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: 900;
            margin: 20px;
            box-shadow: 0 0 20px var(--accent);
        }

        /* التصويت */
        .vote-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #1a1a24;
            padding: 10px 25px;
            margin: 5px;
            border-radius: 10px;
            width: 100%;
            max-width: 500px;
        }
        .vote-count { font-size: 1.5rem; color: var(--accent); font-weight: bold; }

        /* Modal/Popup */
        .modal {
            position: fixed;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--panel);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid var(--detective);
            z-index: 100;
            display: none;
            text-align: center;
            box-shadow: 0 0 100px rgba(0,0,0,0.9);
        }

    </style>
</head>
<body>

<div class="bg-glow"></div>

<div class="container">
    <!-- 1. شاشة البداية -->
    <div id="page-start" class="page active">
        <h1>MAFIARHON</h1>
        <p>تصميم النخبة لألعاب الغموض</p>
        <div class="input-group">
            <input type="number" id="player-count" placeholder="عدد اللاعبين (5-15)" min="5" max="15">
        </div>
        <button onclick="goToNames()">ابدأ الرحلة</button>
    </div>

    <!-- 2. شاشة الأسماء -->
    <div id="page-names" class="page">
        <h2>أدخل أسماء المحاربين</h2>
        <div id="names-container" class="player-grid"></div>
        <button onclick="assignAndStart()">توزيع الأدوار</button>
    </div>

    <!-- 3. شاشة كشف الأدوار -->
    <div id="page-reveal" class="page">
        <h2 id="reveal-user-title">كشف الهوية</h2>
        <div id="reveal-card" class="role-card" style="width: 300px;">
            <img id="role-img" src="https://api.dicebear.com/7.x/bottts/svg?seed=1" alt="role">
            <h3 id="role-name-display">؟؟؟</h3>
            <p id="role-desc">اضغط لرؤية كرتك بعيداً عن الآخرين</p>
        </div>
        <button id="btn-reveal-action" onclick="handleReveal()">إكشف الهوية</button>
    </div>

    <!-- 4. شاشة الليل -->
    <div id="page-night" class="page">
        <h2 id="night-instruction">الليل بدأ...</h2>
        <p id="night-sub-instruction">المافيا يختارون ضحيتهم الآن</p>
        <div id="night-grid" class="player-grid"></div>
        <button onclick="submitNightAction()">تأكيد الاختيار</button>
    </div>

    <!-- 5. شاشة التلخيص -->
    <div id="page-summary" class="page">
        <h2>أحداث الليلة الماضية</h2>
        <div id="summary-text" style="font-size: 1.5rem; line-height: 2;"></div>
        <button onclick="goToDiscussion()">فتح باب النقاش</button>
    </div>

    <!-- 6. شاشة النقاش -->
    <div id="page-discussion" class="page">
        <h2>مرحلة النقاش والمواجهة</h2>
        <div class="timer-circle" id="timer-box">03:30</div>
        <div id="silenced-alert" style="color: var(--mafia); font-weight: bold;"></div>
        <button onclick="goToVoting()">الانتقال للتصويت النهائي</button>
    </div>

    <!-- 7. شاشة التصويت -->
    <div id="page-voting" class="page">
        <h2>من ستطردون الليلة؟</h2>
        <div id="voting-list" style="width: 100%; display: flex; flex-direction: column; align-items: center;"></div>
        <div class="vote-item" style="border: 1px dashed #666;">
            <span>تخطي التصويت</span>
            <div>
                <button onclick="changeVote('skip', -1)">-</button>
                <span class="vote-count" id="count-skip">0</span>
                <button onclick="changeVote('skip', 1)">+</button>
            </div>
        </div>
        <button onclick="calculateVoteResult()">تأكيد النتائج</button>
    </div>
</div>

<!-- مودال المحقق -->
<div id="detective-modal" class="modal">
    <h3>نتائج التحقيق</h3>
    <div id="detective-result-text" style="font-size: 2rem; margin: 20px;"></div>
    <button onclick="closeDetectiveModal()">فهمت</button>
</div>

<script>
    // الأدوار والصور
    const ROLE_DATA = {
        MAFIA_KILLER: { name: 'مافيا القتل', img: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Scooter&backgroundColor=b91d1d' },
        MAFIA_SILENCER: { name: 'مافيا السكيت', img: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Felix&backgroundColor=7c2d12' },
        DOCTOR: { name: 'الطبيب', img: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Aneka&backgroundColor=0c4a6e' },
        DETECTIVE: { name: 'المحقق', img: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Jude&backgroundColor=ca8a04' },
        CITIZEN: { name: 'مواطن', img: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Oliver&backgroundColor=334155' }
    };

    let players = [];
    let currentPlayerIdx = 0;
    let nightPhase = "kill"; // kill, silence, doctor, detective
    let nightChoices = { kill: null, silence: null, doctor: null, detective: null };
    let tempChoice = null;
    let votes = {};

    // تنقل الصفحات
    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function goToNames() {
        const count = document.getElementById('player-count').value;
        if (count < 5 || count > 15) return alert("اختر بين 5 و 15");
        let html = '';
        for (let i = 0; i < count; i++) {
            html += `<div class="input-group"><input type="text" class="name-in" placeholder="اسم اللاعب ${i+1}"></div>`;
        }
        document.getElementById('names-container').innerHTML = html;
        showPage('page-names');
    }

    function assignAndStart() {
        const inputs = document.querySelectorAll('.name-in');
        let names = Array.from(inputs).map(i => i.value || `لاعب ${Math.random().toString(36).substr(2,4)}`);
        
        // توزيع الأدوار الثابت
        let roles = [ROLE_DATA.MAFIA_KILLER, ROLE_DATA.MAFIA_SILENCER, ROLE_DATA.DOCTOR, ROLE_DATA.DETECTIVE];
        while(roles.length < names.length) roles.push(ROLE_DATA.CITIZEN);
        roles = roles.sort(() => Math.random() - 0.5);

        players = names.map((n, i) => ({
            name: n,
            role: roles[i],
            alive: true,
            silenced: false
        }));

        currentPlayerIdx = 0;
        updateRevealPage();
        showPage('page-reveal');
    }

    function updateRevealPage() {
        const p = players[currentPlayerIdx];
        document.getElementById('reveal-user-title').innerText = `دور اللاعب: ${p.name}`;
        document.getElementById('role-name-display').innerText = "؟؟؟";
        document.getElementById('role-img').src = "https://api.dicebear.com/7.x/bottts/svg?seed=unknown";
        document.getElementById('btn-reveal-action').innerText = "إكشف الهوية";
        document.getElementById('btn-reveal-action').onclick = revealRole;
    }

    function revealRole() {
        const p = players[currentPlayerIdx];
        document.getElementById('role-name-display').innerText = p.role.name;
        document.getElementById('role-img').src = p.role.img;
        document.getElementById('btn-reveal-action').innerText = "خلاص عرفت";
        document.getElementById('btn-reveal-action').onclick = () => {
            currentPlayerIdx++;
            if (currentPlayerIdx < players.length) updateRevealPage();
            else startNight();
        };
    }

    function startNight() {
        nightPhase = "kill";
        tempChoice = null;
        updateNightUI();
        showPage('page-night');
    }

    function updateNightUI() {
        const titles = {
            kill: ["المافيا يختارون الضحية", "من تريدون التخلص منه؟"],
            silence: ["مافيا السكيت", "من تريدون إسكاته عن الكلام؟"],
            doctor: ["الطبيب", "من تريد حمايته الليلة؟"],
            detective: ["المحقق", "من تشك في أمره؟"]
        };
        document.getElementById('night-instruction').innerText = titles[nightPhase][0];
        document.getElementById('night-sub-instruction').innerText = titles[nightPhase][1];
        
        const grid = document.getElementById('night-grid');
        grid.innerHTML = '';
        players.forEach(p => {
            if (!p.alive) return;
            const card = document.createElement('div');
            card.className = 'role-card';
            card.innerHTML = `<img src="https://api.dicebear.com/7.x/initials/svg?seed=${p.name}" alt="p"><h3>${p.name}</h3>`;
            card.onclick = () => {
                document.querySelectorAll('#night-grid .role-card').forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
                tempChoice = p;
            };
            grid.appendChild(card);
        });
    }

    function submitNightAction() {
        if (!tempChoice) return alert("يجب اختيار لاعب!");
        nightChoices[nightPhase] = tempChoice;
        
        if (nightPhase === "kill") nightPhase = "silence";
        else if (nightPhase === "silence") nightPhase = "doctor";
        else if (nightPhase === "doctor") nightPhase = "detective";
        else if (nightPhase === "detective") {
            showDetectiveResult();
            return;
        }
        tempChoice = null;
        updateNightUI();
    }

    function showDetectiveResult() {
        const isMafia = nightChoices.detective.role.name.includes("مافيا");
        const modal = document.getElementById('detective-modal');
        document.getElementById('detective-result-text').innerText = isMafia ? "نعم، هو مافيا! 🕵️‍♂️" : "لا، هو بريء ✅";
        document.getElementById('detective-result-text').style.color = isMafia ? "var(--mafia)" : "var(--citizen)";
        modal.style.display = "block";
    }

    function closeDetectiveModal() {
        document.getElementById('detective-modal').style.display = "none";
        processResults();
    }

    function processResults() {
        let deadPlayer = null;
        if (nightChoices.kill.name !== nightChoices.doctor.name) {
            deadPlayer = nightChoices.kill;
            deadPlayer.alive = false;
        }

        players.forEach(p => p.silenced = false);
        nightChoices.silence.silenced = true;

        let summary = deadPlayer 
            ? `المافيا ارتكبوا جريمة! الضحية هو <b style="color:red">${deadPlayer.name}</b>. الطبيب فشل في الحماية.`
            : `ليلة هادئة.. المافيا حاولوا القتل لكن <b style="color:cyan">الطبيب أنقذ الموقف!</b>`;
        
        summary += `<br>وتم <b style="color:orange">تسكيت ${nightChoices.silence.name}</b>، لا يحق له الكلام في النقاش.`;
        
        document.getElementById('summary-text').innerHTML = summary;
        showPage('page-summary');
    }

    function goToDiscussion() {
        showPage('page-discussion');
        let time = 210;
        const silencedP = players.find(p => p.silenced);
        document.getElementById('silenced-alert').innerText = silencedP ? `⚠️ تنبيه: ${silencedP.name} ممنوع من الكلام!` : "";
        
        const timerObj = document.getElementById('timer-box');
        const interval = setInterval(() => {
            let m = Math.floor(time / 60);
            let s = time % 60;
            timerObj.innerText = `${m}:${s < 10 ? '0'+s : s}`;
            if (time <= 10) timerObj.style.color = "red";
            if (time <= 0) { clearInterval(interval); alert("انتهى وقت النقاش!"); }
            time--;
        }, 1000);
        window.currentTimer = interval;
    }

    function goToVoting() {
        clearInterval(window.currentTimer);
        const list = document.getElementById('voting-list');
        list.innerHTML = '';
        votes = { skip: 0 };
        players.forEach(p => {
            if (!p.alive) return;
            votes[p.name] = 0;
            const item = document.createElement('div');
            item.className = 'vote-item';
            item.innerHTML = `
                <span>${p.name}</span>
                <div>
                    <button onclick="changeVote('${p.name}', -1)">-</button>
                    <span class="vote-count" id="count-${p.name}">0</span>
                    <button onclick="changeVote('${p.name}', 1)">+</button>
                </div>
            `;
            list.appendChild(item);
        });
        document.getElementById('count-skip').innerText = "0";
        showPage('page-voting');
    }

    function changeVote(target, val) {
        votes[target] = Math.max(0, votes[target] + val);
        document.getElementById(`count-${target}`).innerText = votes[target];
    }

    function calculateVoteResult() {
        let maxVotes = -1;
        let winner = null;
        let tie = false;

        for (let key in votes) {
            if (votes[key] > maxVotes) {
                maxVotes = votes[key];
                winner = key;
                tie = false;
            } else if (votes[key] === maxVotes && maxVotes > 0) {
                tie = true;
            }
        }

        if (tie || winner === 'skip' || maxVotes === 0) {
            alert("لم يتم طرد أحد (تعادل أو اختيار تخطي)!");
        } else {
            const p = players.find(x => x.name === winner);
            p.alive = false;
            alert(`تم طرد ${p.name}! وكان دوره: ${p.role.name}`);
        }

        checkGameOver();
    }

    function checkGameOver() {
        const mafiaAlive = players.filter(p => p.alive && p.role.name.includes("مافيا")).length;
        const citizensAlive = players.filter(p => p.alive && !p.role.name.includes("مافيا")).length;

        if (mafiaAlive === 0) {
            alert("🎉 فوز ساحق للمواطنين! تم القضاء على المافيا.");
            location.reload();
        } else if (mafiaAlive >= citizensAlive) {
            alert("💀 فازت المافيا! سيطروا على المدينة.");
            location.reload();
        } else {
            startNight();
        }
    }
</script>

</body>
</html>
