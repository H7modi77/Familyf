<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>البطولة الملكية | فاميلي فيود</title>
    
    <!-- الخطوط والمكتبات الخارجية -->
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --gold: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            --royal-red: #800000;
            --dark-bg: #0a0a0a;
        }

        body {
            background: var(--dark-bg);
            color: white;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            overflow: hidden;
            background-image: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            height: 100vh;
        }

        /* شاشة التحميل/البداية */
        .screen {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: 1s all ease;
            padding: 20px;
            box-sizing: border-box;
        }

        .hidden { opacity: 0; visibility: hidden; pointer-events: none; }

        .royal-title {
            font-family: 'Amiri', serif;
            font-size: 5rem;
            background: var(--gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 30px rgba(0,0,0,0.8);
            margin-bottom: 20px;
        }

        /* إطارات فخمة */
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 2px solid;
            border-image: var(--gold) 1;
            padding: 40px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        /* لوحة الأجوبة */
        .game-board {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 90%;
            max-width: 1000px;
            perspective: 1000px;
        }

        .answer-card {
            height: 70px;
            background: #111;
            border: 1px solid #444;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .answer-card.revealed { transform: rotateX(180deg); }

        .front, .back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .front {
            background: linear-gradient(#222, #000);
            justify-content: center;
            font-weight: 900;
            color: #b38728;
        }

        .back {
            background: var(--gold);
            color: black;
            transform: rotateX(180deg);
            justify-content: space-between;
            font-weight: bold;
        }

        /* الأخطاء (Strikes) */
        .strikes-container {
            display: flex;
            gap: 20px;
            margin: 20px;
        }

        .strike-x {
            font-size: 5rem;
            color: #444;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
            transition: 0.3s;
        }

        .strike-x.active {
            color: #ff0000;
            text-shadow: 0 0 30px #ff0000;
            animation: shake 0.5s;
        }

        @keyframes shake {
            0% { transform: scale(2); }
            100% { transform: scale(1); }
        }

        /* المؤقت */
        #timer-ring {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 5px solid #333;
            border-top: 5px solid gold;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
        }

        .btn-gold {
            background: var(--gold);
            border: none;
            padding: 15px 30px;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            margin: 10px;
            transition: 0.3s;
            clip-path: polygon(5% 0%, 95% 0%, 100% 50%, 95% 100%, 5% 100%, 0% 50%);
        }

        .btn-gold:hover { transform: scale(1.1); filter: brightness(1.2); }

        input, select {
            background: rgba(0,0,0,0.5);
            border: 1px solid gold;
            color: white;
            padding: 10px;
            margin: 5px;
            font-size: 1rem;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <!-- 1. شاشة الإعدادات -->
    <div id="setup-screen" class="screen">
        <h1 class="royal-title">البطولة الملكية</h1>
        <div class="glass-panel">
            <h3>إعدادات المنافسة</h3>
            <select id="team-count" onchange="generateTeamInputs()">
                <option value="2">فريقين (نهائي)</option>
                <option value="4">4 فرق (نصف نهائي)</option>
                <option value="8">8 فرق (بطولة كاملة)</option>
            </select>
            <div id="team-inputs" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px;">
                <!-- ستتولد هنا -->
            </div>
            <div style="margin-top: 20px;">
                <label>تحميل ملف الأسئلة (JSON):</label><br>
                <input type="file" id="json-upload" accept=".json">
            </div>
            <button class="btn-gold" onclick="startTournament()">بدء المراسم الملكية</button>
        </div>
    </div>

    <!-- 2. شاشة القرعة -->
    <div id="tournament-screen" class="screen hidden">
        <h1 class="royal-title">المواجهات المرتقبة</h1>
        <div id="bracket-area" class="glass-panel" style="background: none; border: none;">
            <!-- القرعة تظهر هنا -->
        </div>
        <button class="btn-gold" onclick="launchGame()">بدء المواجهة</button>
    </div>

    <!-- 3. شاشة اللعبة الرئيسية -->
    <div id="game-screen" class="screen hidden">
        <div style="display: flex; width: 100%; justify-content: space-around; align-items: center;">
            <div id="team1-box" class="glass-panel" style="width: 200px;">
                <h2 id="team1-name">الفريق 1</h2>
                <div id="team1-score" style="font-size: 3rem;">0</div>
            </div>

            <div id="timer-ring">15</div>

            <div id="team2-box" class="glass-panel" style="width: 200px;">
                <h2 id="team2-name">الفريق 2</h2>
                <div id="team2-score" style="font-size: 3rem;">0</div>
            </div>
        </div>

        <h2 id="current-question" class="royal-title" style="font-size: 2.5rem; margin-top: 40px;">السؤال يظهر هنا</h2>

        <div id="answers-grid" class="game-board">
            <!-- الإجابات ستولد هنا -->
        </div>

        <div class="strikes-container">
            <div class="strike-x" id="strike-1">X</div>
            <div class="strike-x" id="strike-2">X</div>
            <div class="strike-x" id="strike-3">X</div>
        </div>

        <!-- لوحة تحكم المقدم (مخفية جزئياً) -->
        <div style="position: absolute; bottom: 10px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 50px;">
            <button class="btn-gold" onclick="handleStrike()">خطأ (X)</button>
            <button class="btn-gold" onclick="toggleTimer()">بدء/إيقاف المؤقت</button>
            <button class="btn-gold" onclick="nextQuestion()" style="background: var(--royal-red); color: white;">السؤال التالي</button>
        </div>
    </div>

    <!-- المؤثرات الصوتية (روابط خارجية كمثال) -->
    <audio id="snd-correct" src="https://assets.mixkit.co/active_storage/sfx/2020/2020-preview.mp3"></audio>
    <audio id="snd-wrong" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>
    <audio id="snd-timer" src="https://assets.mixkit.co/active_storage/sfx/2021/2021-preview.mp3" loop></audio>

    <script>
        let state = {
            teams: [],
            questions: [],
            currentQ: 0,
            strikes: 0,
            timeLeft: 15,
            timerRunning: false,
            timerInterval: null,
            team1Score: 0,
            team2Score: 0
        };

        // 1. إنشاء حقول الفرق
        function generateTeamInputs() {
            const count = document.getElementById('team-count').value;
            const container = document.getElementById('team-inputs');
            container.innerHTML = '';
            for(let i=1; i<=count; i++) {
                container.innerHTML += `<input type="text" id="t${i}" placeholder="اسم الفريق ${i}" value="فريق ${i}">`;
            }
        }
        generateTeamInputs();

        // 2. معالجة ملف الأسئلة
        document.getElementById('json-upload').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = (event) => {
                state.questions = JSON.parse(event.target.result);
                alert("تم تحميل الملف الملكي بنجاح!");
            };
            reader.readAsText(e.target.files[0]);
        });

        // 3. بدء البطولة والقرعة
        function startTournament() {
            const count = document.getElementById('team-count').value;
            for(let i=1; i<=count; i++) {
                state.teams.push(document.getElementById(`t${i}`).value);
            }
            // خلط الفرق
            state.teams.sort(() => Math.random() - 0.5);

            switchScreen('setup-screen', 'tournament-screen');
            renderBracket();
        }

        function renderBracket() {
            const area = document.getElementById('bracket-area');
            area.innerHTML = '';
            state.teams.forEach((team, i) => {
                if(i % 2 === 0) {
                    const match = document.createElement('div');
                    match.className = 'glass-panel';
                    match.style.margin = '10px';
                    match.innerHTML = `<span class="gold-text">${team}</span> VS <span class="gold-text">${state.teams[i+1] || '---'}</span>`;
                    area.appendChild(match);
                    gsap.from(match, {x: i%4===0?-500:500, opacity:0, duration: 1, delay: i*0.2});
                }
            });
        }

        // 4. تشغيل اللعبة
        function launchGame() {
            if(state.questions.length === 0) return alert("حمل ملف الأسئلة أولاً!");
            switchScreen('tournament-screen', 'game-screen');
            loadQuestion();
        }

        function loadQuestion() {
            const q = state.questions[state.currentQ];
            document.getElementById('current-question').innerText = q.question;
            const grid = document.getElementById('answers-grid');
            grid.innerHTML = '';
            state.strikes = 0;
            resetStrikesUI();

            q.answers.forEach((ans, i) => {
                grid.innerHTML += `
                    <div class="answer-card" onclick="revealAnswer(this, ${ans.points})">
                        <div class="front">${i+1}</div>
                        <div class="back">
                            <span>${ans.text}</span>
                            <span>${ans.points}</span>
                        </div>
                    </div>
                `;
            });
        }

        function revealAnswer(el, pts) {
            if(el.classList.contains('revealed')) return;
            el.classList.add('revealed');
            document.getElementById('snd-correct').play();
            // إضافة نقاط افتراضية للفريق الأول (يمكنك تطوير نظام اختيار الفريق)
            state.team1Score += pts;
            document.getElementById('team1-score').innerText = state.team1Score;
            
            // احتفال بسيط عند كشف الإجابة رقم 1
            if(pts > 30) confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#bf953f', '#fcf6ba'] });
        }

        function handleStrike() {
            state.strikes++;
            document.getElementById('snd-wrong').play();
            if(state.strikes <= 3) {
                document.getElementById(`strike-${state.strikes}`).classList.add('active');
                gsap.to("body", {backgroundColor: "#300", duration: 0.1, yoyo: true, repeat: 1});
            }
        }

        function resetStrikesUI() {
            for(let i=1; i<=3; i++) document.getElementById(`strike-${i}`).classList.remove('active');
        }

        // 5. التحكم في الوقت
        function toggleTimer() {
            if(state.timerRunning) {
                clearInterval(state.timerInterval);
                document.getElementById('snd-timer').pause();
            } else {
                document.getElementById('snd-timer').play();
                state.timerInterval = setInterval(() => {
                    state.timeLeft--;
                    document.getElementById('timer-ring').innerText = state.timeLeft;
                    if(state.timeLeft <= 0) {
                        toggleTimer();
                        handleStrike();
                    }
                }, 1000);
            }
            state.timerRunning = !state.timerRunning;
        }

        function nextQuestion() {
            state.currentQ++;
            if(state.currentQ < state.questions.length) {
                state.timeLeft = 15;
                document.getElementById('timer-ring').innerText = "15";
                loadQuestion();
            } else {
                alert("انتهت البطولة الملكية!");
            }
        }

        function switchScreen(from, to) {
            document.getElementById(from).classList.add('hidden');
            setTimeout(() => {
                document.getElementById(from).style.display = 'none';
                document.getElementById(to).style.display = 'flex';
                document.getElementById(to).classList.remove('hidden');
            }, 1000);
        }

    </script>
</body>
</html>
